<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IAI · Privacidad y Preferencias</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:#f8fafc;font-family:'DM Sans',system-ui,sans-serif}
    #root{min-height:100%}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .step-card{cursor:pointer;transition:box-shadow .15s,transform .15s}
    .step-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .btn{cursor:pointer;transition:all .15s;border:none;font-family:'DM Sans',sans-serif}
    .btn:hover{opacity:.85}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
    .back-link{text-decoration:none;color:#64748b;font-size:13px;display:inline-flex;align-items:center;gap:5px}
    .back-link:hover{color:#334155}
  </style>

<style>
.iai-nav{position:sticky;top:0;z-index:999;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.iai-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:24px;height:44px;overflow-x:auto}
.iai-nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;font-size:12px;font-weight:600;color:#0f172a;white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace}
.iai-nav-dot{width:8px;height:8px;border-radius:99px;background:#f97316;flex-shrink:0}
.iai-nav-links{display:flex;gap:2px;align-items:center}
.iai-nav-links a{text-decoration:none;font-size:12px;color:#64748b;padding:4px 10px;border-radius:6px;white-space:nowrap;transition:background .15s,color .15s}
.iai-nav-links a:hover{background:#f1f5f9;color:#0f172a}
.iai-nav-links a.active{background:#fff7ed;color:#f97316;font-weight:500}
</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var cur=window.location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.iai-nav-links a').forEach(function(a){
    if(a.getAttribute('href')===cur)a.classList.add('active');
  });
});
</script>

</head>
<body>
<nav class="iai-nav">
  <div class="iai-nav-inner">
    <a class="iai-nav-logo" href="index.html">
      <span class="iai-nav-dot"></span>
      <span>IAI · Documentación</span>
    </a>
    <div class="iai-nav-links">
      <a href="index.html">Inicio</a>
      <a href="alta-socios.html">Alta socios</a>
      <a href="acceso-portal.html">Acceso portal</a>
      <a href="gestion-socios.html">Gestión socios</a>
      <a href="ciclo-producto.html">Productos</a>
      <a href="inscripciones-aforo-diplomas.html">Inscripciones</a>
      <a href="administracion-pagos.html">Pagos</a>
      <a href="consultas-reportes-notificaciones.html">Consultas</a>
      <a href="privacidad-etica.html">Privacidad</a>
      <a href="renovacion-cuota.html">Renovación</a>
      <a href="estado-proyecto.html">Estado</a>
      <a href="inventario.html">Inventario</a>
    </div>
  </div>
</nav>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const SYS_COLOR = {
  usuario:"#64748b", weweb:"#8b5cf6", supabase:"#10b981",
  n8n:"#ef4444", hubspot:"#f97316",
};
const SYS_LABEL = {
  usuario:"Usuario / Socio", weweb:"Portal del socio",
  supabase:"Base de datos", n8n:"Automatización", hubspot:"CRM",
};

const FASE_STYLES = {
  acceso:      {bg:"#eff6ff", text:"#1d4ed8", border:"#bfdbfe", label:"Acceso"},
  autorizacion:{bg:"#f5f3ff", text:"#5b21b6", border:"#ddd6fe", label:"Autorizaciones de visibilidad"},
  notificacion:{bg:"#ecfeff", text:"#155e75", border:"#a5f3fc", label:"Notificaciones"},
  etica:       {bg:"#fff1f2", text:"#9f1239", border:"#fecdd3", label:"Código de ética"},
  sync:        {bg:"#fef2f2", text:"#991b1b", border:"#fecaca", label:"Sincronización"},
};

const SCENARIOS = {
  preferencias: {
    icon:"🔒", label:"Preferencias y privacidad",
    color:"#8b5cf6", ac:"AC-07",
    desc:"El socio gestiona sus autorizaciones de visibilidad y preferencias de comunicación",
    end:"Preferencias guardadas y sincronizadas. El socio controla qué información comparte y cómo le contactan.",
  },
  etica: {
    icon:"📋", label:"Aceptación código de ética",
    color:"#f43f5e", ac:"AC-07",
    desc:"Nuevo socio acepta el código de ética al acceder al portal por primera vez",
    end:"Código de ética aceptado y registrado. El socio accede al portal con normalidad.",
    wip:true,
  },
};

const ALL_STEPS = [

  // ── PREFERENCIAS ──
  {scenario:"preferencias", sys:"weweb", fase:"acceso", wip:false,
    who:"El socio",
    what:"Accede a 'Preferencias y privacidad' en su perfil",
    why:"Desde el perfil del portal, el socio puede gestionar en cualquier momento qué información comparte con IAI y con otros socios, y cómo quiere recibir comunicaciones.",
    tech:"Portal WeWeb → perfil → sección Preferencias y privacidad. Lee user_profiles: allow_listing_courses, allow_directory_listing, allow_member_contact, marketing_consent."},

  {scenario:"preferencias", sys:"weweb", fase:"autorizacion", wip:false,
    who:"El socio",
    what:"Gestiona si su nombre aparece en las listas de asistentes de cursos",
    why:"El socio decide si otros participantes de los cursos pueden ver que él también está inscrito. Si lo desactiva, su nombre no aparece en los listados de asistentes.",
    tech:"user_profiles.allow_listing_courses (boolean). Afecta a los listados que genera IAI y a los que pueden ver otros alumnos en el portal."},

  {scenario:"preferencias", sys:"weweb", fase:"autorizacion", wip:false,
    who:"El socio",
    what:"Gestiona si aparece en el directorio de socios del instituto",
    why:"IAI mantiene un directorio de socios visible para otros miembros. El socio puede optar por no aparecer en él si prefiere mayor privacidad.",
    tech:"user_profiles.allow_directory_listing (boolean). Si false, el perfil no aparece en búsquedas del directorio de socios aunque la membresía esté activa."},

  {scenario:"preferencias", sys:"weweb", fase:"autorizacion", wip:false,
    who:"El socio",
    what:"Gestiona si otros socios pueden contactarle vía email a través de la plataforma",
    why:"La plataforma permite que socios se contacten entre sí sin revelar las direcciones de email. El socio puede desactivar esta opción si no quiere recibir mensajes de otros miembros.",
    tech:"user_profiles.allow_member_contact (boolean). Si true, otros socios pueden enviar mensajes a través del sistema de mensajería interna (member_messages). El email real nunca se expone."},

  {scenario:"preferencias", sys:"weweb", fase:"notificacion", wip:false,
    who:"El socio",
    what:"Gestiona si recibe notificaciones de la plataforma por email",
    why:"Además de los emails transaccionales obligatorios (confirmaciones de pago, facturas), el socio puede optar por recibir también notificaciones sobre consumo de horas, facturación y disponibilidad de documentación.",
    tech:"user_profiles.marketing_consent (boolean) + marketing_consent_date (timestamp). Registra cuándo se dio o retiró el consentimiento. user_comm_preferences para preferencias granulares por canal."},

  {scenario:"preferencias", sys:"supabase", fase:"sync", wip:false,
    who:"El sistema",
    what:"Guarda los cambios inmediatamente",
    why:"Las preferencias se actualizan en tiempo real. No hay que esperar ni confirmar — el cambio es efectivo desde el momento en que el socio lo activa o desactiva.",
    tech:"UPDATE user_profiles con los campos de privacidad modificados. updated_at actualizado. Inserción en user_activity_log para trazabilidad de cambios de consentimiento (requerimiento RGPD)."},

  {scenario:"preferencias", sys:"n8n", fase:"sync", wip:false,
    who:"El sistema",
    what:"Sincroniza las preferencias de comunicación al CRM",
    why:"HubSpot refleja inmediatamente si el socio ha dado o retirado su consentimiento de marketing, para que las campañas de email respeten siempre las preferencias actuales.",
    tech:"SYNC-SP-PROFILE-UPDATED-01: detecta cambio en marketing_consent → PATCH Contacto HubSpot con el estado de marketing consent actualizado."},

  // ── CÓDIGO DE ÉTICA ──
  {scenario:"etica", sys:"weweb", fase:"acceso", wip:true,
    who:"El nuevo socio",
    what:"Accede al portal por primera vez con membresía activa",
    why:"Tras la aprobación del alta y la activación de la membresía, el socio entra al portal. Antes de acceder a cualquier sección, debe aceptar el código de ética de IAI.",
    tech:"🚧 EN CONSTRUCCIÓN — Verificar en cada login: si user_profiles.membership_status = activo Y ethics_accepted_at IS NULL → mostrar popup obligatorio antes de renderizar el contenido."},

  {scenario:"etica", sys:"weweb", fase:"etica", wip:true,
    who:"El socio",
    what:"Ve un popup obligatorio con el código de ética que no puede cerrar sin aceptar",
    why:"El código de ética es un requisito para ser socio de IAI. El popup es bloqueante — el socio no puede navegar por el portal hasta que lo haya leído y aceptado explícitamente.",
    tech:"🚧 EN CONSTRUCCIÓN — Modal WeWeb bloqueante (no tiene botón de cerrar, solo 'He leído y acepto'). Muestra el texto completo del código de ética con scroll obligatorio antes de habilitar el botón de aceptación."},

  {scenario:"etica", sys:"supabase", fase:"etica", wip:true,
    who:"El sistema",
    what:"Registra la aceptación con fecha y hora",
    why:"La aceptación queda registrada con exactitud: quién aceptó, cuándo y qué versión del código de ética estaba vigente. Esto es importante de cara a posibles auditorías o reclamaciones.",
    tech:"🚧 EN CONSTRUCCIÓN — Nuevo campo en user_profiles: ethics_accepted_at (timestamp), ethics_version (varchar para versionar el documento). UPDATE al aceptar el popup."},

  {scenario:"etica", sys:"weweb", fase:"acceso", wip:true,
    who:"El socio",
    what:"Accede al portal con normalidad tras la aceptación",
    why:"Una vez aceptado el código de ética, el popup no vuelve a aparecer a menos que IAI publique una nueva versión del documento que requiera nueva aceptación.",
    tech:"🚧 EN CONSTRUCCIÓN — Aplicar también a socios existentes si se publica nueva versión del código: ethics_version en user_profiles != versión actual → popup obligatorio en el siguiente login."},
];

function SystemTag({sys}) {
  var c=SYS_COLOR[sys]||"#94a3b8"; var l=SYS_LABEL[sys]||sys;
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:c+"18",border:"1px solid "+c+"44",borderRadius:99,padding:"1px 8px",fontSize:10,color:c,fontWeight:500,fontFamily:"DM Mono,monospace",whiteSpace:"nowrap"}}>{l}</span>;
}

function FaseBadge({fase}) {
  var c=FASE_STYLES[fase]||FASE_STYLES.acceso;
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,whiteSpace:"nowrap",background:c.bg,color:c.text,border:"1px solid "+c.border}}>{c.label}</span>;
}

function PhaseHeader({fase,isFirst}) {
  var c=FASE_STYLES[fase]||FASE_STYLES.acceso;
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,margin:isFirst?"0 0 12px":"22px 0 12px"}}>
      <div style={{width:8,height:8,borderRadius:99,background:c.text,flexShrink:0}}/>
      <span style={{fontSize:11,fontWeight:600,color:c.text,fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.07em"}}>{c.label}</span>
      <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
    </div>
  );
}

function Step({step,idx,techMode,isActive,onToggle}) {
  var sc=SYS_COLOR[step.sys]||"#94a3b8";
  var wipBorder=step.wip?"#fbbf24":null;
  return (
    <div style={{position:"relative"}}>
      {idx>0&&<div style={{height:18,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0",borderRadius:1}}/></div>}
      <div className="step-card" onClick={function(){onToggle(idx);}}
        style={{background:step.wip?"#fffbeb":"white",
          border:"1px solid "+(isActive?sc+"60":(wipBorder||"#e2e8f0")),
          borderLeft:"3px solid "+(wipBorder||sc),
          borderRadius:12,padding:"14px 16px",
          display:"flex",gap:12,alignItems:"flex-start",
          boxShadow:isActive?"0 2px 12px rgba(0,0,0,.08)":"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{width:32,height:32,borderRadius:99,flexShrink:0,
          background:isActive?sc:(step.wip?"#fef3c7":"#f1f5f9"),
          border:"2px solid "+(isActive?sc:(step.wip?"#fbbf24":"#e2e8f0")),
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:step.wip?14:12,fontWeight:600,
          color:isActive?"white":(step.wip?"#92400e":"#94a3b8"),
          transition:"all .2s",marginTop:1}}>
          {step.wip?"🚧":idx+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,flexWrap:"wrap",marginBottom:5}}>
            <span style={{fontSize:13,fontWeight:600,color:"#1e293b",lineHeight:1.35,flex:1,minWidth:100}}>
              <span style={{color:"#94a3b8",fontWeight:400,marginRight:4}}>{step.who} —</span>
              {step.what}
            </span>
            <FaseBadge fase={step.fase}/>
            {step.wip&&<span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,background:"#fef3c7",color:"#92400e",border:"1px solid #fde68a",whiteSpace:"nowrap"}}>🚧 En construcción</span>}
          </div>
          <p style={{fontSize:13,color:"#475569",lineHeight:1.6,marginBottom:6}}>{step.why}</p>
          <SystemTag sys={step.sys}/>
          {(techMode||isActive)&&step.tech&&(
            <div style={{marginTop:10,padding:"8px 12px",
              background:step.wip?"#fef9c3":"#f8fafc",
              borderRadius:8,border:"1px solid "+(step.wip?"#fde68a":"#e2e8f0"),
              animation:"fadeIn .2s ease"}}>
              <div style={{fontSize:10,fontWeight:600,color:step.wip?"#92400e":"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3,fontFamily:"DM Mono,monospace"}}>
                {step.wip?"Estado técnico":"Detalle técnico"}
              </div>
              <p style={{fontSize:12,color:step.wip?"#78350f":"#64748b",lineHeight:1.55,fontFamily:"DM Mono,monospace"}}>{step.tech}</p>
            </div>
          )}
        </div>
        <div style={{color:"#cbd5e1",fontSize:14,flexShrink:0,marginTop:6,transform:isActive?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
      </div>
    </div>
  );
}

function App() {
  var sa=useState("preferencias"); var scenario=sa[0]; var setScenario=sa[1];
  var ta=useState(false); var techMode=ta[0]; var setTechMode=ta[1];
  var aa=useState(null); var activeStep=aa[0]; var setActiveStep=aa[1];

  function toggle(idx){setActiveStep(activeStep===idx?null:idx);}

  var steps=ALL_STEPS.filter(function(s){return s.scenario===scenario;});
  var sc=SCENARIOS[scenario];
  var lastFase=null;
  var wipCount=steps.filter(function(s){return s.wip;}).length;

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>

      <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"16px 20px",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <a href="index.html" className="back-link">← Todos los procesos</a>
                <span style={{color:"#e2e8f0"}}>·</span>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"DM Mono,monospace"}}>AC-07</span>
              </div>
              <h1 style={{fontSize:20,fontWeight:600,color:"#0f172a",letterSpacing:"-0.02em"}}>🔒 Privacidad y Código de Ética</h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:2}}>Autorizaciones de visibilidad, preferencias de comunicación y aceptación del código de ética</p>
            </div>
            <button className="btn" onClick={function(){setTechMode(!techMode);}}
              style={{padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:500,
                background:techMode?"#1e293b":"#f1f5f9",color:techMode?"white":"#64748b",
                border:"1px solid "+(techMode?"#1e293b":"#e2e8f0"),flexShrink:0,marginTop:2}}>
              {techMode?"⚙️ Técnico":"👁 Funcional"}
            </button>
          </div>

          <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap"}}>
            {Object.entries(SCENARIOS).map(function(e){
              var key=e[0]; var s=e[1]; var active=scenario===key;
              return (
                <button key={key} className="btn"
                  onClick={function(){setScenario(key);setActiveStep(null);}}
                  style={{padding:"6px 13px",borderRadius:8,fontSize:12,fontWeight:active?600:400,
                    background:active?s.color:"white",color:active?"white":"#64748b",
                    border:"1px solid "+(active?s.color:"#e2e8f0"),position:"relative"}}>
                  {s.icon} {s.label}
                  {s.wip&&<span style={{position:"absolute",top:-4,right:-4,width:8,height:8,borderRadius:99,background:"#f59e0b",border:"2px solid white"}}/>}
                </button>
              );
            })}
          </div>

          <div style={{marginTop:10,padding:"7px 12px",background:sc.color+"0f",
            border:"1px solid "+sc.color+"30",borderRadius:8,
            display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{width:5,height:5,borderRadius:99,background:sc.color,flexShrink:0}}/>
            <span style={{fontSize:12,color:sc.color}}>{sc.desc}</span>
            <span style={{fontSize:12,color:"#94a3b8"}}>· {steps.length} pasos</span>
            {wipCount>0&&<span style={{fontSize:11,color:"#92400e",background:"#fef3c7",padding:"1px 8px",borderRadius:99,border:"1px solid #fde68a"}}>🚧 {wipCount} en construcción</span>}
          </div>
        </div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"24px 16px"}}>

        {steps.map(function(step,idx){
          var showHeader=step.fase!==lastFase;
          lastFase=step.fase;
          return (
            <div key={idx}>
              {showHeader&&<PhaseHeader fase={step.fase} isFirst={idx===0}/>}
              <Step step={step} idx={idx} techMode={techMode} isActive={activeStep===idx} onToggle={toggle}/>
            </div>
          );
        })}

        <div style={{height:18,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0"}}/></div>
        <div style={{display:"flex",gap:12,alignItems:"center",background:"white",
          border:"1px solid "+(wipCount>0?"#fde68a":"#a7f3d0"),
          borderLeft:"3px solid "+(wipCount>0?"#f59e0b":"#10b981"),
          borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div style={{width:32,height:32,borderRadius:99,
            background:wipCount>0?"#f59e0b":"#10b981",color:"white",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
            {wipCount>0?"🚧":"✓"}
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:wipCount>0?"#92400e":"#065f46"}}>
              {wipCount>0?"Proceso parcialmente implementado":"Proceso completado"}
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:1}}>{sc.end}</div>
          </div>
        </div>

        {/* RGPD note */}
        {scenario==="preferencias"&&(
          <div style={{marginTop:20,padding:"12px 14px",background:"#eff6ff",borderRadius:10,border:"1px solid #bfdbfe"}}>
            <div style={{fontSize:12,color:"#1d4ed8",lineHeight:1.6}}>
              <strong>RGPD:</strong> los cambios de consentimiento de marketing quedan registrados con fecha y hora en el sistema. Esto permite a IAI demostrar que cuenta con el consentimiento explícito del socio en caso de inspección o reclamación.
            </div>
          </div>
        )}
        {scenario==="etica"&&(
          <div style={{marginTop:20,padding:"12px 14px",background:"#fff1f2",borderRadius:10,border:"1px solid #fecdd3"}}>
            <div style={{fontSize:12,color:"#9f1239",lineHeight:1.6}}>
              <strong>Versionado del código de ética:</strong> cuando IAI actualice el código de ética, todos los socios deberán aceptar la nueva versión la próxima vez que entren al portal, independientemente de que ya lo hubieran aceptado antes.
            </div>
          </div>
        )}

        <div style={{marginTop:24,padding:"16px",background:"white",borderRadius:12,border:"1px solid #e2e8f0"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10,fontFamily:"DM Mono,monospace"}}>Campos en user_profiles</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["allow_listing_courses","allow_directory_listing","allow_member_contact","marketing_consent","marketing_consent_date"].map(function(f){
              return <span key={f} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 9px",fontSize:11,color:"#64748b",fontFamily:"DM Mono,monospace"}}>{f}</span>;
            })}
            {scenario==="etica"&&["ethics_accepted_at","ethics_version"].map(function(f){
              return <span key={f} style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:6,padding:"3px 9px",fontSize:11,color:"#92400e",fontFamily:"DM Mono,monospace"}}>🚧 {f}</span>;
            })}
          </div>
