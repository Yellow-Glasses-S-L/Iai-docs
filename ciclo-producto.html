function SystemTag({ sys }) {
  var color=SYS_COLOR[sys]||"#94a3b8"; var label=SYS_LABEL[sys]||sys;
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:color+"18",border:"1px solid "+color+"44",borderRadius:99,padding:"1px 8px",fontSize:10,color:color,fontWeight:500,fontFamily:"DM Mono,monospace",letterSpacing:"0.02em",whiteSpace:"nowrap"}}>{label}</span>;
}

function FaseBadge({ fase }) {
  var c=FASE_STYLES[fase]||FASE_STYLES.creacion;
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,letterSpacing:"0.03em",whiteSpace:"nowrap",background:c.bg,color:c.text,border:"1px solid "+c.border}}>{c.label}</span>;
}

function PhaseHeader({ fase, isFirst }) {
  var c=FASE_STYLES[fase]||FASE_STYLES.creacion;
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,margin:isFirst?"0 0 12px":"24px 0 12px"}}>
      <div style={{width:8,height:8,borderRadius:99,background:c.text,flexShrink:0}}/>
      <span style={{fontSize:11,fontWeight:600,color:c.text,fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.07em"}}>{c.label}</span>
      <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
    </div>
  );
}

function Step({ step, idx, techMode, isActive, onToggle, filterTipo }) {
  var sc=SYS_COLOR[step.sys]||"#94a3b8";
  var isTipoOnly=step.tipos.length===1;
  var tipoColor=isTipoOnly?TIPO_INFO[step.tipos[0]].color:null;
  var tipoLabel=isTipoOnly?TIPO_INFO[step.tipos[0]].icon+" solo "+TIPO_INFO[step.tipos[0]].label:null;
  var wipBorder=step.wip?"#fbbf24":null;

  return (
    <div style={{position:"relative"}}>
      {idx>0&&<div style={{height:20,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0",borderRadius:1}}/></div>}
      <div className="step-card" onClick={function(){onToggle(idx);}}
        style={{background:step.wip?"#fffbeb":"white",
          border:"1px solid "+(isActive?sc+"60":(wipBorder||"#e2e8f0")),
          borderLeft:"3px solid "+(wipBorder||tipoColor||sc),
          borderRadius:12,padding:"14px 16px",
          display:"flex",gap:12,alignItems:"flex-start",
          boxShadow:isActive?"0 2px 12px rgba(0,0,0,.08)":"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{width:32,height:32,borderRadius:99,flexShrink:0,
          background:isActive?sc:(step.wip?"#fef3c7":"#f1f5f9"),
          border:"2px solid "+(isActive?sc:(step.wip?"#fbbf24":"#e2e8f0")),
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:step.wip?14:12,fontWeight:600,
          color:isActive?"white":(step.wip?"#92400e":"#94a3b8"),
          transition:"all .2s",marginTop:1}}>
          {step.wip?"🚧":idx+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,flexWrap:"wrap",marginBottom:5}}>
            <span style={{fontSize:13,fontWeight:600,color:"#1e293b",lineHeight:1.35,flex:1,minWidth:100}}>
              <span style={{color:"#94a3b8",fontWeight:400,marginRight:4}}>{step.who} —</span>
              {step.what}
            </span>
            <FaseBadge fase={step.fase}/>
            {isTipoOnly&&<span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,whiteSpace:"nowrap",background:tipoColor+"18",color:tipoColor,border:"1px solid "+tipoColor+"44"}}>{tipoLabel}</span>}
            {step.wip&&<span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,background:"#fef3c7",color:"#92400e",border:"1px solid #fde68a",whiteSpace:"nowrap"}}>🚧 En construcción</span>}
          </div>
          <p style={{fontSize:13,color:"#475569",lineHeight:1.6,marginBottom:6}}>{step.why}</p>
          <SystemTag sys={step.sys}/>
          {(techMode||isActive)&&step.tech&&(
            <div style={{marginTop:10,padding:"8px 12px",
              background:step.wip?"#fef9c3":"#f8fafc",
              borderRadius:8,border:"1px solid "+(step.wip?"#fde68a":"#e2e8f0"),animation:"fadeIn .2s ease"}}>
              <div style={{fontSize:10,fontWeight:600,color:step.wip?"#92400e":"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3,fontFamily:"DM Mono,monospace"}}>
                {step.wip?"Estado técnico":"Detalle técnico"}
              </div>
              <p style={{fontSize:12,color:step.wip?"#78350f":"#64748b",lineHeight:1.55,fontFamily:"DM Mono,monospace"}}>{step.tech}</p>
            </div>
          )}
        </div>
        <div style={{color:"#cbd5e1",fontSize:14,flexShrink:0,marginTop:6,transform:isActive?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
      </div>
    </div>
  );
}

function App() {
  var fa=useState(null); var filterTipo=fa[0]; var setFilterTipo=fa[1];
  var ta=useState(false); var techMode=ta[0]; var setTechMode=ta[1];
  var aa=useState(null); var activeStep=aa[0]; var setActiveStep=aa[1];

  function toggle(idx){setActiveStep(activeStep===idx?null:idx);}

  var steps=STEPS.filter(function(s){
    if(!filterTipo) return true;
    return s.tipos.indexOf(filterTipo)>=0;
  });

  var lastFase=null;

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>
      <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"16px 20px",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <a href="index.html" className="back-link">← Todos los procesos</a>
                <span style={{color:"#e2e8f0"}}>·</span>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"DM Mono,monospace"}}>AC-06 · AC-08 · AC-10</span>
              </div>
              <h1 style={{fontSize:20,fontWeight:600,color:"#0f172a",letterSpacing:"-0.02em"}}>📦 Ciclo de Vida de Producto</h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:2}}>Desde que se crea en el CRM hasta que aparece en la web y el campus</p>
            </div>
            <button className="toggle-btn" onClick={function(){setTechMode(!techMode);}}
              style={{padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:500,
                background:techMode?"#1e293b":"#f1f5f9",color:techMode?"white":"#64748b",
                border:"1px solid "+(techMode?"#1e293b":"#e2e8f0"),flexShrink:0,marginTop:2}}>
              {techMode?"⚙️ Técnico":"👁 Funcional"}
            </button>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#94a3b8",flexShrink:0}}>Tipo de producto:</span>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {Object.entries(TIPO_INFO).map(function(e){
                var key=e[0]; var t=e[1]; var active=filterTipo===key;
                return (
                  <button key={key} className="toggle-btn"
                    onClick={function(){setFilterTipo(active?null:key);setActiveStep(null);}}
                    style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:active?600:400,
                      background:active?t.color:"white",color:active?"white":"#64748b",
                      border:"1px solid "+(active?t.color:"#e2e8f0")}}>
                    {t.icon} {t.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"24px 16px"}}>
        {steps.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:"#94a3b8"}}>
            <div style={{fontSize:32,marginBottom:12}}>🔍</div>
            <div style={{fontSize:14,marginBottom:12}}>Sin pasos para el tipo seleccionado</div>
            <button onClick={function(){setFilterTipo(null);}} className="toggle-btn"
              style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,color:"#64748b",padding:"8px 16px",fontSize:12}}>
              Ver todos
            </button>
          </div>
        )}

        {steps.map(function(step, idx){
          var showHeader=step.fase!==lastFase;
          lastFase=step.fase;
          return (
            <div key={idx}>
              {showHeader&&<PhaseHeader fase={step.fase} isFirst={idx===0}/>}
              <Step step={step} idx={idx} techMode={techMode} isActive={activeStep===idx} onToggle={toggle} filterTipo={filterTipo}/>
            </div>
          );
        })}

        {steps.length>0&&(
          <div>
            <div style={{height:20,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0"}}/></div>
            <div style={{display:"flex",gap:12,alignItems:"center",background:"white",
              border:"1px solid #a7f3d0",borderLeft:"3px solid #10b981",borderRadius:12,padding:"14px 16px",
              boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
              <div style={{width:32,height:32,borderRadius:99,background:"#10b981",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,color:"white"}}>✓</div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#065f46"}}>Producto publicado</div>
                <div style={{fontSize:12,color:"#6b7280",marginTop:1}}>
                  Visible en la web · Guardado en el portal · {!filterTipo||filterTipo==="formacion"?"Aula creada en el campus · ":""}Listo para recibir inscripciones
                </div>
              </div>
            </div>
          </div>
        )}

        <div style={{marginTop:32,padding:"16px",background:"white",borderRadius:12,border:"1px solid #e2e8f0"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12,fontFamily:"DM Mono,monospace"}}>Sistemas involucrados</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {Object.keys(SYS_COLOR).map(function(s){return <SystemTag key={s} sys={s}/>;})}
          </div>
          <div style={{padding:"10px 12px",background:"#fffbeb",borderRadius:8,border:"1px solid #fde68a"}}>
            <div style={{fontSize:12,color:"#92400e",lineHeight:1.6}}>
              <strong>¿Qué dispara este proceso?</strong> Activar un producto en el CRM es suficiente. SYNC-WP-01 publica en la web, actualiza el portal y crea el aula en el campus en segundos. Para Los Lunes IAI, además crea el canal en Nirestream y gestiona las matrículas del pack anual (🚧 en construcción).
            </div>
          </div>
          <div style={{marginTop:10,fontSize:12,color:"#94a3b8",lineHeight:1.6}}>
            Haz clic en cualquier paso para ver más detalle. Activa <strong style={{color:"#1e293b"}}>modo técnico</strong> para ver los sistemas y automatizaciones implicadas.
          </div>
        </div>
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
