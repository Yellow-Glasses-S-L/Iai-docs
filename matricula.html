<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAI · Proceso de Matrícula</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:#f8fafc;font-family:'DM Sans',system-ui,sans-serif}
    #root{min-height:100%}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .toggle-btn{cursor:pointer;transition:all .15s;border:none;font-family:'DM Sans',sans-serif}
    .toggle-btn:hover{opacity:.85}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
    .back-link{text-decoration:none;color:#64748b;font-size:13px;display:inline-flex;align-items:center;gap:5px}
    .back-link:hover{color:#334155}
    @media(max-width:767px){.desktop-only{display:none!important}}
    @media(min-width:768px){.mobile-only{display:none!important}}

    /* ── DUAL-COLUMN LAYOUT ── */
    .flow-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:0;
      position:relative;
    }
    @media(max-width:767px){
      .flow-grid{grid-template-columns:1fr;}
    }

    /* Column headers */
    .col-header{
      padding:10px 16px;
      font-size:10px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:0.07em;
      font-family:'DM Mono',monospace;
      color:#94a3b8;
      background:#f8fafc;
      border-bottom:1px solid #e2e8f0;
      position:sticky;
      top:0;
      z-index:5;
    }
    .col-header-left{border-right:1px solid #e2e8f0;}
    .col-header-right{color:#64748b;}

    /* Row */
    .step-row{
      display:contents;
    }
    .step-row-left,.step-row-right{
      padding:16px;
      border-bottom:1px solid #f1f5f9;
      position:relative;
      background:white;
      transition:background .15s;
    }
    .step-row-left{
      border-right:1px solid #e2e8f0;
    }
    .step-row-left:hover,.step-row-right:hover{
      background:#fafbfc;
    }
    /* sync hover on same row via CSS sibling — done via JS highlight instead */

    /* Phase header row */
    .phase-row{
      display:contents;
    }
    .phase-cell{
      padding:8px 16px 6px;
      background:#f8fafc;
      border-bottom:1px solid #e2e8f0;
    }
    .phase-cell-left{border-right:1px solid #e2e8f0;}

    /* Timeline dot and line inside left cell */
    .tl-dot{
      width:10px;height:10px;border-radius:99px;
      border:2px solid white;
      flex-shrink:0;
      margin-top:3px;
      box-shadow:0 0 0 2px #e2e8f0;
    }
    .tl-line{
      position:absolute;
      left:29px;
      top:0;bottom:0;
      width:2px;
      background:#e2e8f0;
      z-index:0;
    }
    .tl-line-first{top:24px;}
    .tl-line-last{bottom:calc(100% - 24px);}

    /* Step number badge */
    .step-num{
      width:22px;height:22px;border-radius:99px;
      display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:600;
      flex-shrink:0;
      position:relative;z-index:1;
    }

    /* System tags */
    .sys-tag{
      display:inline-flex;align-items:center;gap:3px;
      border-radius:99px;padding:2px 8px;
      font-size:10px;font-weight:500;
      font-family:'DM Mono',monospace;
      letter-spacing:0.02em;white-space:nowrap;
    }

    /* Path badge */
    .path-badge{
      display:inline-block;padding:1px 7px;border-radius:99px;
      font-size:10px;font-weight:500;white-space:nowrap;
    }

    /* Connector between columns — decorative arrow */
    .col-connector{
      position:absolute;
      right:-8px;
      top:50%;
      transform:translateY(-50%);
      width:16px;height:16px;
      background:#e2e8f0;
      border-radius:99px;
      display:flex;align-items:center;justify-content:center;
      font-size:8px;color:#94a3b8;
      z-index:2;
    }
  </style>

<style>
.iai-nav{position:sticky;top:0;z-index:999;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.iai-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:24px;height:44px;overflow-x:auto}
.iai-nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;font-size:12px;font-weight:600;color:#0f172a;white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace}
.iai-nav-dot{width:8px;height:8px;border-radius:99px;background:#f97316;flex-shrink:0}
.iai-nav-links{display:flex;gap:2px;align-items:center}
.iai-nav-links a{text-decoration:none;font-size:12px;color:#64748b;padding:4px 10px;border-radius:6px;white-space:nowrap;transition:background .15s,color .15s}
.iai-nav-links a:hover{background:#f1f5f9;color:#0f172a}
.iai-nav-links a.active{background:#fff7ed;color:#f97316;font-weight:500}
</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var cur=window.location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.iai-nav-links a').forEach(function(a){
    if(a.getAttribute('href')===cur)a.classList.add('active');
  });
});
</script>

</head>
<body>
<nav class="iai-nav">
  <div class="iai-nav-inner">
    <a class="iai-nav-logo" href="index.html">
      <span class="iai-nav-dot"></span>
      <span>IAI · Documentación</span>
    </a>
    <div class="iai-nav-links">
      <a href="index.html">Inicio</a>
      <a href="inventario.html">Procesos</a>
      <a href="issues.html">Incidentes</a>
    </div>
  </div>
</nav>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ─── COLOUR PALETTE ───────────────────────────────────────────────────────────
const SYSTEM_COLORS = {
  usuario:   "#64748b",
  wordpress: "#3b82f6",
  weweb:     "#8b5cf6",
  supabase:  "#10b981",
  redsys:    "#f59e0b",
  n8n:       "#ef4444",
  hubspot:   "#f97316",
  moodle:    "#06b6d4",
  bc:        "#6366f1",
};

const SYSTEM_LABELS = {
  usuario:   "Usuario",
  wordpress: "Web pública",
  weweb:     "Portal del socio",
  supabase:  "Base de datos",
  redsys:    "Pasarela de pago",
  n8n:       "Automatización",
  hubspot:   "CRM",
  moodle:    "Campus virtual",
  bc:        "Facturación",
};

const FASE_COLORS = {
  descubrimiento: { bg:"#f1f5f9", text:"#475569", border:"#e2e8f0" },
  inicio:         { bg:"#eff6ff", text:"#1d4ed8", border:"#bfdbfe" },
  pago:           { bg:"#fffbeb", text:"#92400e", border:"#fde68a" },
  confirmacion:   { bg:"#ecfdf5", text:"#065f46", border:"#a7f3d0" },
  sincronizacion: { bg:"#fef2f2", text:"#991b1b", border:"#fecaca" },
  entrega:        { bg:"#f5f3ff", text:"#5b21b6", border:"#ddd6fe" },
  facturacion:    { bg:"#eef2ff", text:"#3730a3", border:"#c7d2fe" },
};

const FASE_LABELS = {
  descubrimiento: "Descubrimiento",
  inicio:         "Inicio",
  pago:           "Pago",
  confirmacion:   "Confirmación",
  sincronizacion: "Registro en CRM",
  entrega:        "Acceso al curso",
  facturacion:    "Facturación",
};

// ─── STEPS ────────────────────────────────────────────────────────────────────
const STEPS = [
  { sys:"usuario", fase:"descubrimiento",
    who:"El usuario",
    what:"Navega por el catálogo de formación en la web",
    why:"Descubre los cursos disponibles con toda la información: fechas, precios, plazas y modalidad.",
    tech:"WordPress muestra los productos publicados sincronizados desde HubSpot vía SYNC-WP-01.",
    techSystems:["wordpress","hubspot"],
    paths:["tarjeta","transferencia","credito"] },

  { sys:"weweb", fase:"descubrimiento",
    who:"El portal",
    what:"Muestra el botón de inscripción con el precio según tipo de socio",
    why:"El precio que ve cada usuario se adapta automáticamente: socio individual, corporativo o no socio.",
    tech:"WeWeb consulta Supabase para determinar membership_type del usuario y mostrar el precio correcto.",
    techSystems:["weweb","supabase"],
    paths:["tarjeta","transferencia","credito"] },

  { sys:"usuario", fase:"inicio",
    who:"El usuario",
    what:"Hace clic en 'Inscribirse' e inicia sesión en el portal",
    why:"Para completar la compra es necesario tener una cuenta. Si no la tiene, puede crearla en este momento.",
    tech:"Redireccionamiento a portal.auditoresinternos.es. Autenticación vía Supabase Auth.",
    techSystems:["weweb","supabase"],
    paths:["tarjeta","transferencia","credito"] },

  { sys:"weweb", fase:"inicio",
    who:"El usuario",
    what:"Revisa el carrito y elige cómo pagar",
    why:"Puede pagar con tarjeta de forma inmediata, por transferencia bancaria o con crédito formativo si dispone de saldo.",
    tech:"El carrito se crea en shopping_carts + shopping_cart_items. Se consulta credits_granted del user_profile.",
    techSystems:["weweb","supabase"],
    paths:["tarjeta","transferencia","credito"] },

  // TARJETA
  { sys:"redsys", fase:"pago",
    who:"El usuario",
    what:"Introduce sus datos de tarjeta en la pasarela de pago segura",
    why:"El pago se procesa a través de Redsys (TPV virtual de IAI). Es instantáneo y seguro.",
    tech:"Edge Function redsys-initiate-payment genera la firma. Redsys notifica el resultado vía POST al webhook.",
    techSystems:["redsys","supabase"],
    paths:["tarjeta"] },

  { sys:"supabase", fase:"confirmacion",
    who:"El sistema",
    what:"Confirma el pago y registra la compra automáticamente",
    why:"En cuanto Redsys confirma el cobro, el sistema registra la inscripción sin intervención manual.",
    tech:"Edge Function redsys-webhook verifica firma, actualiza cart a 'pagado', crea deals + deal_items.",
    techSystems:["supabase","redsys"],
    paths:["tarjeta"] },

  // TRANSFERENCIA
  { sys:"supabase", fase:"pago",
    who:"El sistema",
    what:"Genera el pedido y envía los datos bancarios al usuario por email",
    why:"El usuario recibe un email con el número de pedido y la cuenta bancaria a la que hacer la transferencia.",
    tech:"Edge Function transfer-initiate-payment. Cart en estado pendiente_transferencia en shopping_carts.",
    techSystems:["supabase","n8n"],
    paths:["transferencia"] },

  { sys:"weweb", fase:"pago",
    who:"El usuario",
    what:"Realiza la transferencia bancaria con el número de pedido como referencia",
    why:"El número de pedido permite a IAI identificar el pago cuando llegue al banco.",
    tech:"Estado del cart queda en pendiente_transferencia hasta confirmación manual.",
    techSystems:["weweb","supabase"],
    paths:["transferencia"] },

  { sys:"supabase", fase:"confirmacion",
    who:"IAI (administración)",
    what:"Confirma el ingreso bancario y activa la inscripción",
    why:"Una persona de IAI verifica el extracto bancario y marca el pago como recibido en el portal.",
    tech:"Edge Function confirm-transfer actualiza cart a 'pagado', crea deals + deal_items en Supabase.",
    techSystems:["supabase","weweb"],
    paths:["transferencia"] },

  // CRÉDITO
  { sys:"supabase", fase:"pago",
    who:"El sistema",
    what:"Descuenta el crédito formativo del saldo del usuario",
    why:"Si el usuario tiene saldo de crédito formativo suficiente, la inscripción se completa al instante sin pago externo.",
    tech:"Se verifica credits_granted en user_profiles. Se descuenta y se crea el cart en estado pagado directamente.",
    techSystems:["supabase"],
    paths:["credito"] },

  { sys:"supabase", fase:"confirmacion",
    who:"El sistema",
    what:"Registra la inscripción como completada",
    why:"El saldo ha sido descontado y la inscripción queda confirmada automáticamente.",
    tech:"deals + deal_items creados con credits_used reflejando las horas consumidas.",
    techSystems:["supabase"],
    paths:["credito"] },

  // COMÚN post-pago
  { sys:"hubspot", fase:"sincronizacion",
    who:"El sistema",
    what:"Registra la venta en el CRM de IAI",
    why:"Cada inscripción queda registrada en HubSpot para el seguimiento comercial, reporting y facturación.",
    tech:"n8n workflow Post-Pago crea Deal en HubSpot: etapa qualifiedtobuy → line items → closedwon.",
    techSystems:["n8n","hubspot"],
    paths:["tarjeta","transferencia","credito"] },

  { sys:"moodle", fase:"entrega",
    who:"El sistema",
    what:"Da acceso al usuario al curso en el campus virtual",
    why:"El alumno queda matriculado automáticamente y puede acceder al curso desde campus.auditoresinternos.es.",
    tech:"n8n workflow Moodle Enrollment: crea usuario si no existe, enrol_users con el moodle_course_id del producto.",
    techSystems:["n8n","moodle"],
    paths:["tarjeta","transferencia","credito"] },

  { sys:"bc", fase:"facturacion",
    who:"El sistema",
    what:"Genera la prefactura con el IVA correcto",
    why:"Business Central crea el documento fiscal aplicando el IVA que corresponde según la ubicación y tipo del comprador.",
    tech:"n8n consulta iai_reglas_iva en Supabase por línea de producto. PATCH a BC para crear la prefactura.",
    techSystems:["n8n","supabase","bc"],
    paths:["tarjeta","transferencia","credito"] },

  { sys:"weweb", fase:"facturacion",
    who:"El usuario",
    what:"Ve su nueva inscripción en 'Mis cursos' y puede descargar la factura",
    why:"El portal refleja el estado actualizado: matrícula activa, pago confirmado y factura disponible.",
    tech:"Portal WeWeb lee de Supabase: product_registrations, deals, deal_items. Factura desde BC.",
    techSystems:["weweb","supabase","bc"],
    paths:["tarjeta","transferencia","credito"] },
];

const PATH_INFO = {
  tarjeta:       { icon:"💳", label:"Tarjeta",       color:"#f59e0b", desc:"Pago inmediato — confirmación automática" },
  transferencia: { icon:"🏦", label:"Transferencia", color:"#3b82f6", desc:"Pago diferido — IAI confirma el ingreso" },
  credito:       { icon:"🎟️", label:"Crédito formativo", color:"#10b981", desc:"Descuento de saldo — sin pasarela de pago" },
};

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function SystemTag({ sys }) {
  var color = SYSTEM_COLORS[sys] || "#94a3b8";
  var label = SYSTEM_LABELS[sys] || sys;
  return (
    <span className="sys-tag" style={{
      background:color+"18",
      border:"1px solid "+color+"44",
      color:color,
    }}>
      {label}
    </span>
  );
}

function FaseBadge({ fase }) {
  var c = FASE_COLORS[fase] || FASE_COLORS.descubrimiento;
  var label = FASE_LABELS[fase] || fase;
  return (
    <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,
      fontSize:10,fontWeight:500,letterSpacing:"0.03em",whiteSpace:"nowrap",
      background:c.bg,color:c.text,border:"1px solid "+c.border}}>
      {label}
    </span>
  );
}

// Phase header spanning both columns
function PhaseHeaderRow({ fase }) {
  var c = FASE_COLORS[fase] || FASE_COLORS.descubrimiento;
  var label = FASE_LABELS[fase] || fase;
  return (
    <React.Fragment>
      <div className="phase-cell phase-cell-left">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:7,height:7,borderRadius:99,background:c.text,flexShrink:0}}/>
          <span style={{fontSize:10,fontWeight:600,color:c.text,
            fontFamily:"DM Mono, monospace",textTransform:"uppercase",letterSpacing:"0.07em"}}>
            {label}
          </span>
          <div style={{flex:1,height:1,background:c.border}}/>
        </div>
      </div>
      <div className="phase-cell">
        <div style={{height:7}}/>
      </div>
    </React.Fragment>
  );
}

function StepRow({ step, idx, isFirst, isLast, hoveredRow, setHoveredRow }) {
  var sc = SYSTEM_COLORS[step.sys] || "#94a3b8";
  var isPathOnly = step.paths.length === 1;
  var pathColor = isPathOnly ? PATH_INFO[step.paths[0]].color : null;
  var isHovered = hoveredRow === idx;

  var rowBg = isHovered ? "#f8fafc" : "white";

  return (
    <React.Fragment>
      {/* LEFT: functional / process */}
      <div
        className="step-row-left"
        style={{background:rowBg, borderLeft:"3px solid "+(pathColor||sc)+"55"}}
        onMouseEnter={function(){setHoveredRow(idx);}}
        onMouseLeave={function(){setHoveredRow(null);}}>

        {/* Timeline line */}
        <div style={{
          position:"absolute",left:27,top:0,bottom:0,
          width:2,background:"#e2e8f0",zIndex:0,
        }}/>

        <div style={{display:"flex",gap:10,alignItems:"flex-start",position:"relative",zIndex:1}}>
          {/* Step number dot */}
          <div className="step-num" style={{
            background:isHovered?sc:"#f1f5f9",
            border:"2px solid "+(isHovered?sc:"#e2e8f0"),
            color:isHovered?"white":"#94a3b8",
            transition:"all .2s",
            marginTop:1,
          }}>
            {idx+1}
          </div>

          <div style={{flex:1,minWidth:0}}>
            {/* Who + What */}
            <div style={{display:"flex",alignItems:"flex-start",gap:6,flexWrap:"wrap",marginBottom:5}}>
              {isPathOnly && (
                <span className="path-badge" style={{
                  background:pathColor+"15",color:pathColor,
                  border:"1px solid "+pathColor+"40",marginBottom:2,
                }}>
                  {PATH_INFO[step.paths[0]].icon} {PATH_INFO[step.paths[0]].label}
                </span>
              )}
            </div>
            <p style={{fontSize:12,color:"#94a3b8",fontWeight:400,marginBottom:2,lineHeight:1.3}}>
              {step.who}
            </p>
            <p style={{fontSize:13,fontWeight:600,color:"#1e293b",lineHeight:1.4,marginBottom:6}}>
              {step.what}
            </p>
            <p style={{fontSize:12,color:"#64748b",lineHeight:1.6}}>
              {step.why}
            </p>
          </div>
        </div>
      </div>

      {/* RIGHT: system / technical */}
      <div
        className="step-row-right"
        style={{background:rowBg}}
        onMouseEnter={function(){setHoveredRow(idx);}}
        onMouseLeave={function(){setHoveredRow(null);}}>

        <div style={{paddingLeft:4}}>
          {/* System tags */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
            {(step.techSystems || [step.sys]).map(function(s){
              return <SystemTag key={s} sys={s}/>;
            })}
          </div>

          {/* Tech description */}
          <p style={{
            fontSize:12,color:"#64748b",lineHeight:1.6,
            fontFamily:"DM Mono, monospace",
            padding:"8px 10px",
            background:"#f8fafc",
            borderRadius:7,
            border:"1px solid #e2e8f0",
          }}>
            {step.tech}
          </p>
        </div>
      </div>
    </React.Fragment>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  var pa = useState("tarjeta"); var path = pa[0]; var setPath = pa[1];
  var ha = useState(null); var hoveredRow = ha[0]; var setHoveredRow = ha[1];

  var steps = STEPS.filter(function(s){
    return s.paths.indexOf(path) >= 0;
  });

  var lastFase = null;

  // Build rows: insert phase headers when fase changes
  var rows = [];
  steps.forEach(function(step, idx){
    var showHeader = step.fase !== lastFase;
    lastFase = step.fase;
    if(showHeader){
      rows.push({ type:"phase", fase:step.fase, key:"phase-"+step.fase });
    }
    rows.push({ type:"step", step:step, idx:idx, key:"step-"+idx });
  });

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>

      {/* ── HEADER ── */}
      <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"16px 20px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <a href="index.html" className="back-link">← Todos los procesos</a>
                <span style={{color:"#e2e8f0"}}>·</span>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"DM Mono, monospace"}}>AC-12</span>
              </div>
              <h1 style={{fontSize:20,fontWeight:600,color:"#0f172a",letterSpacing:"-0.02em"}}>
                🎓 Proceso de Matrícula
              </h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:2}}>
                Desde que el usuario encuentra un curso hasta que accede al campus y recibe la factura
              </p>
            </div>
          </div>

          {/* Payment path */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#94a3b8",flexShrink:0}}>Vía de pago:</span>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.entries(PATH_INFO).map(function(e){
                var key=e[0]; var p=e[1];
                var active=path===key;
                return (
                  <button key={key} className="toggle-btn"
                    onClick={function(){setPath(key);setHoveredRow(null);}}
                    style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:active?600:400,
                      background:active?p.color:"white",color:active?"white":"#64748b",
                      border:"1px solid "+(active?p.color:"#e2e8f0")}}>
                    {p.icon} {p.label}
                  </button>
                );
              })}
            </div>
            {path !== "tarjeta" && (
              <span style={{fontSize:12,color:PATH_INFO[path].color,marginLeft:4}}>
                — {PATH_INFO[path].desc}
              </span>
            )}
          </div>
        </div>
      </div>

      {/* ── FLOW ── */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px"}}>

        {/* Grid container */}
        <div style={{
          background:"white",
          border:"1px solid #e2e8f0",
          borderRadius:12,
          overflow:"hidden",
          boxShadow:"0 1px 4px rgba(0,0,0,.05)",
        }}>
          {/* Column headers */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
            <div className="col-header col-header-left" style={{
              display:"flex",alignItems:"center",gap:7,
              borderRight:"1px solid #e2e8f0",
            }}>
              <span style={{
                width:6,height:6,borderRadius:99,
                background:"#64748b",
                display:"inline-block",flexShrink:0,
              }}/>
              Qué ocurre (proceso)
            </div>
            <div className="col-header col-header-right" style={{
              display:"flex",alignItems:"center",gap:7,
            }}>
              <span style={{
                width:6,height:6,borderRadius:99,
                background:"#10b981",
                display:"inline-block",flexShrink:0,
              }}/>
              Qué hace el sistema
            </div>
          </div>

          {/* Rows */}
          <div className="flow-grid">
            {rows.map(function(row){
              if(row.type === "phase"){
                return <PhaseHeaderRow key={row.key} fase={row.fase}/>;
              }
              return (
                <StepRow
                  key={row.key}
                  step={row.step}
                  idx={row.idx}
                  hoveredRow={hoveredRow}
                  setHoveredRow={setHoveredRow}
                />
              );
            })}
          </div>

          {/* End row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
            <div style={{
              padding:"14px 16px",
              borderRight:"1px solid #e2e8f0",
              borderTop:"1px solid #f1f5f9",
              background:"#f0fdf4",
              display:"flex",alignItems:"center",gap:10,
              gridColumn:"1 / -1",
            }}>
              <div style={{
                width:28,height:28,borderRadius:99,
                background:"#10b981",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:13,flexShrink:0,color:"white",fontWeight:700,
              }}>✓</div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#065f46"}}>Proceso completado</div>
                <div style={{fontSize:12,color:"#6b7280",marginTop:1}}>
                  El usuario tiene acceso al curso · La compra está registrada · La factura está disponible
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Legend */}
        <div style={{
          marginTop:20,padding:"14px 16px",
          background:"white",borderRadius:10,
          border:"1px solid #e2e8f0",
          display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap",
        }}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",
              letterSpacing:"0.06em",marginBottom:8,fontFamily:"DM Mono, monospace"}}>
              Sistemas involucrados
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["usuario","weweb","redsys","supabase","n8n","hubspot","moodle","bc"].map(function(s){
                return <SystemTag key={s} sys={s}/>;
              })}
            </div>
          </div>
          <div style={{
            fontSize:12,color:"#94a3b8",lineHeight:1.6,
            borderLeft:"1px solid #f1f5f9",paddingLeft:16,
            maxWidth:340,
          }}>
            La columna izquierda describe <strong style={{color:"#475569"}}>lo que ocurre</strong> desde el punto de vista del usuario o del administrador.
            La columna derecha muestra <strong style={{color:"#475569"}}>los sistemas y las operaciones técnicas</strong> que se ejecutan en paralelo.
          </div>
        </div>

        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
