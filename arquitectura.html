<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IAI · Arquitectura del Sistema</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:#0f172a;font-family:'DM Sans',system-ui,sans-serif;color:#e2e8f0}
    #root{min-height:100%}
    .iai-nav{position:sticky;top:0;z-index:999;background:#1e293b;border-bottom:1px solid #334155;box-shadow:0 1px 3px rgba(0,0,0,.3)}
    .iai-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:24px;height:44px;overflow-x:auto}
    .iai-nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;font-size:12px;font-weight:600;color:#f1f5f9;white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace}
    .iai-nav-dot{width:8px;height:8px;border-radius:99px;background:#f97316;flex-shrink:0}
    .iai-nav-links{display:flex;gap:2px;align-items:center}
    .iai-nav-links a{text-decoration:none;font-size:12px;color:#94a3b8;padding:4px 10px;border-radius:6px;white-space:nowrap;transition:background .15s,color .15s}
    .iai-nav-links a:hover{background:#334155;color:#f1f5f9}
    .iai-nav-links a.active{background:#f97316;color:white;font-weight:500}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  </style>
  <script>
  document.addEventListener('DOMContentLoaded',function(){
    var cur=window.location.pathname.split('/').pop()||'index.html';
    document.querySelectorAll('.iai-nav-links a').forEach(function(a){
      if(a.getAttribute('href')===cur)a.classList.add('active');
    });
  });
  </script>
</head>
<body>
<nav class="iai-nav">
  <div class="iai-nav-inner">
    <a class="iai-nav-logo" href="index.html">
      <span class="iai-nav-dot"></span>
      <span>IAI · Documentación</span>
    </a>
    <div class="iai-nav-links">
      <a href="index.html">Inicio</a>
      <a href="inventario.html">Procesos</a>
      <a href="issues.html">Incidentes</a>
      <a href="arquitectura.html">Arquitectura</a>
    </div>
  </div>
</nav>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ═══════════════════════════════════════════════════════════════
   DATA MODEL — mirrors the People Excellence PowerPoint layout
   but maps to the real implemented architecture
   ═══════════════════════════════════════════════════════════════ */

var GROUPS = [
  {
    id:"actors", label:"Actores", color:"#64748b", position:"left",
    desc:"Quiénes interactúan con el ecosistema",
    items:[
      { id:"usuarios", icon:"👤", label:"Socios", sub:"Individuales y corporativos", color:"#64748b" },
      { id:"admin",    icon:"🏛️", label:"Equipo IAI", sub:"Gestión interna", color:"#f43f5e" },
    ]
  },
  {
    id:"interface", label:"Interfaz", color:"#8b5cf6", position:"center-left",
    desc:"Portal del socio — punto de contacto único para usuarios y administradores",
    tech:"WeWeb · Supabase Auth · RLS",
    items:[
      { id:"dashboard",  icon:"📊", label:"Dashboard de socios",     sub:"Perfil, membresía, histórico", color:"#8b5cf6" },
      { id:"accesos",    icon:"🔐", label:"Control de accesos",      sub:"Auth, roles, permisos (RLS)", color:"#8b5cf6" },
      { id:"carrito",    icon:"🛒", label:"Inscripciones y carrito",  sub:"Eventos, cursos, checkout", color:"#8b5cf6" },
      { id:"corp_panel", icon:"🏢", label:"Panel corporativo",       sub:"Gestión de miembros empresa", color:"#8b5cf6" },
      { id:"admin_panel",icon:"⚙️", label:"Panel administración",    sub:"Aprobaciones, config, soporte", color:"#f43f5e" },
    ]
  },
  {
    id:"core", label:"Herramienta Central", color:"#10b981", position:"center",
    desc:"Motor operativo — base de datos, autenticación y lógica de negocio",
    tech:"Supabase · PostgreSQL · Edge Functions · Storage",
    master:["Autenticación y sesiones","Inscripciones y registros","Pagos y transacciones","Diplomas y certificados","Créditos formativos y saldos"],
    items:[
      { id:"db",       icon:"🗄️", label:"Base de datos",       sub:"user_profiles, companies, products, deals…", color:"#10b981" },
      { id:"auth",     icon:"🔑", label:"Autenticación",        sub:"Email/password, OAuth, JWT, sesiones", color:"#10b981" },
      { id:"edge_fn",  icon:"⚡", label:"Edge Functions",       sub:"Pagos, diplomas, cancelaciones, invitaciones", color:"#10b981" },
      { id:"storage",  icon:"📁", label:"Storage",              sub:"PDFs, certificados, publicaciones", color:"#10b981" },
      { id:"realtime", icon:"🔄", label:"Realtime",             sub:"Suscripciones a cambios en tiempo real", color:"#10b981" },
    ]
  },
  {
    id:"integrator", label:"Integrador", color:"#ef4444", position:"center",
    desc:"Orquestador — sincroniza todos los sistemas mediante workflows automáticos",
    tech:"n8n · Webhooks · REST · Cron",
    master:["Lógica de sincronización","Transformación de datos","Cron jobs (renovaciones, recordatorios)"],
    items:[
      { id:"sync_hs",  icon:"🔁", label:"Sync HubSpot ↔ Supabase", sub:"Contactos, empresas, deals (bidireccional)", color:"#ef4444" },
      { id:"sync_wp",  icon:"📡", label:"Publicación Web + Moodle", sub:"Productos → WordPress + campus", color:"#ef4444" },
      { id:"sync_pay", icon:"💸", label:"Workflows de pago",        sub:"Facturación, confirmaciones, recordatorios", color:"#ef4444" },
      { id:"cron",     icon:"⏰", label:"Cron jobs",                sub:"Renovaciones, vencimientos, alertas", color:"#ef4444" },
    ]
  },
  {
    id:"crm", label:"CRM — Cerebro de Negocio", color:"#f97316", position:"right",
    desc:"Donde IAI trabaja día a día — fuente de verdad para datos de gestión",
    tech:"HubSpot CRM · API v3 · Webhooks",
    master:["Productos y cursos","Empresas y tramos","Tipo de membresía","Pipeline de deals","Datos maestros de contactos"],
    items:[
      { id:"contactos",  icon:"👥", label:"Contactos y Empresas",   sub:"Socios, prospectos, organizaciones", color:"#f97316" },
      { id:"productos",  icon:"📦", label:"Productos y Servicios",  sub:"Cursos, eventos, publicaciones, cuotas", color:"#f97316" },
      { id:"deals",      icon:"💼", label:"Deals y Pipeline",       sub:"Facturación, renovaciones, cobros", color:"#f97316" },
      { id:"comunicaciones",icon:"📧",label:"Comunicaciones",       sub:"Mailings, campañas, seguimiento", color:"#f97316", phase2:true },
    ]
  },
  {
    id:"services", label:"Servicios", color:"#3b82f6", position:"right",
    desc:"Plataformas especializadas que reciben datos del integrador",
    items:[
      { id:"wp_web",     icon:"🌐", label:"Web pública",      sub:"Landing, eventos, formaciones", color:"#3b82f6", tech:"WordPress" },
      { id:"moodle_lms", icon:"📚", label:"Campus virtual",   sub:"Cursos online, matriculación, progreso", color:"#06b6d4", tech:"Moodle" },
      { id:"nirestream", icon:"📺", label:"Streaming",        sub:"Los Lunes IAI, eventos en vivo", color:"#a855f7", phase2:true, tech:"Nirestream" },
      { id:"publicaciones",icon:"📖",label:"Publicaciones",   sub:"PDFs con marca de agua, descarga protegida", color:"#3b82f6", tech:"Supabase Storage" },
    ]
  },
  {
    id:"erp", label:"ERP / Pagos", color:"#6366f1", position:"right",
    desc:"Facturación oficial y procesamiento de cobros",
    items:[
      { id:"contabilidad",icon:"📄", label:"Contabilidad",       sub:"Facturas con validez fiscal, series", color:"#6366f1", tech:"Business Central" },
      { id:"cobros_card", icon:"💳", label:"Cobros con tarjeta", sub:"TPV virtual, 3D Secure, HMAC-SHA256", color:"#f59e0b", tech:"Redsys" },
      { id:"transferencia",icon:"🏦",label:"Transferencia bancaria",sub:"Confirmación manual por IAI admin", color:"#64748b" },
      { id:"creditos",    icon:"🎓", label:"Crédito formativo",  sub:"Bolsa de horas, saldo FIFO", color:"#8b5cf6" },
    ]
  },
  {
    id:"interno", label:"Interno", color:"#f43f5e", position:"bottom",
    desc:"Herramientas internas del equipo IAI",
    items:[
      { id:"admin_tools", icon:"🛠️", label:"Gestión operativa",     sub:"Admin panel WeWeb + HubSpot", color:"#f43f5e" },
      { id:"reporting",   icon:"📈", label:"Reporting y analítica",  sub:"Dashboards de socios, eventos, cobros", color:"#f43f5e", pending:true },
    ]
  },
];

var CONNECTIONS = [
  { from:"actors",     to:"interface",   label:"Login, navegación, acciones",     type:"solid" },
  { from:"interface",  to:"core",        label:"CRUD, Auth, Edge Functions",       type:"solid" },
  { from:"core",       to:"integrator",  label:"Webhooks de cambios",             type:"dashed" },
  { from:"integrator", to:"core",        label:"UPDATE datos sincronizados",      type:"dashed" },
  { from:"integrator", to:"crm",         label:"PATCH contactos, CREATE deals",   type:"dashed" },
  { from:"crm",        to:"integrator",  label:"Webhooks de productos y contactos",type:"dashed" },
  { from:"integrator", to:"services",    label:"POST contenido, crear cursos",    type:"dashed" },
  { from:"integrator", to:"erp",         label:"Crear facturas",                  type:"dashed" },
  { from:"interface",  to:"erp",         label:"Iniciar pago (Redsys)",           type:"solid" },
  { from:"erp",        to:"core",        label:"Webhook confirmación pago",       type:"dashed" },
  { from:"actors",     to:"crm",         label:"IAI gestiona día a día",          type:"solid" },
  { from:"interno",    to:"crm",         label:"Reporting desde CRM",             type:"dotted" },
  { from:"interno",    to:"interface",   label:"Admin panel",                     type:"solid" },
];

var PROCESS_FILTERS = [
  { id:"all",   label:"Todo",           icon:"🏗️", groups:null },
  { id:"alta",  label:"Alta socios",    icon:"📋", groups:["actors","interface","core","integrator","crm","services"] },
  { id:"gest",  label:"Gestión socios", icon:"✏️", groups:["actors","interface","core","integrator","crm"] },
  { id:"prod",  label:"Productos",      icon:"📦", groups:["actors","crm","integrator","services","core"] },
  { id:"insc",  label:"Inscripciones",  icon:"🎟️", groups:["actors","interface","core","integrator","crm","services"] },
  { id:"pago",  label:"Pagos",          icon:"💰", groups:["actors","interface","core","erp","integrator"] },
  { id:"renov", label:"Renovación",     icon:"🔄", groups:["core","integrator","crm","erp","interface","interno"] },
];

/* ═══════════════════════════════════════════════════════════════
   COMPONENTS
   ═══════════════════════════════════════════════════════════════ */

function SubItem({ item }) {
  return (
    <div style={{
      display:"flex",alignItems:"flex-start",gap:8,
      padding:"8px 10px",background:"#0f172a",borderRadius:8,
      border:"1px solid #1e293b",
      transition:"border-color .15s",
    }}>
      <span style={{fontSize:16,lineHeight:1,flexShrink:0,marginTop:1}}>{item.icon}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{item.label}</span>
          {item.tech && <span style={{fontSize:9,color:"#64748b",fontFamily:"'DM Mono',monospace",background:"#1e293b",padding:"1px 6px",borderRadius:4}}>{item.tech}</span>}
          {item.phase2 && <span style={{fontSize:9,color:"#a855f7",fontFamily:"'DM Mono',monospace",background:"#a855f7"+"18",padding:"1px 6px",borderRadius:4,border:"1px solid #a855f7"+"30"}}>Fase 2</span>}
          {item.pending && <span style={{fontSize:9,color:"#f59e0b",fontFamily:"'DM Mono',monospace",background:"#f59e0b"+"18",padding:"1px 6px",borderRadius:4,border:"1px solid #f59e0b"+"30"}}>Pendiente</span>}
        </div>
        <div style={{fontSize:10,color:"#64748b",marginTop:2,lineHeight:1.4}}>{item.sub}</div>
      </div>
    </div>
  );
}

function GroupCard({ group, isActive, isExpanded, onToggle }) {
  var dim = !isActive;
  var hasMaster = group.master && group.master.length > 0;
  return (
    <div style={{
      background:"#1e293b",
      border:"2px solid "+(isExpanded ? group.color : (dim ? "#1e293b" : group.color+"40")),
      borderRadius:16,
      opacity:dim?0.2:1,
      transition:"all .3s ease",
      overflow:"hidden",
      boxShadow:isExpanded?"0 0 30px "+group.color+"15":"none",
    }}>
      {/* Header */}
      <div onClick={onToggle} style={{
        padding:"14px 16px",cursor:"pointer",
        background:isExpanded?group.color+"12":"transparent",
        display:"flex",alignItems:"center",gap:10,
        borderBottom:isExpanded?"1px solid "+group.color+"25":"1px solid transparent",
        transition:"all .2s",
      }}>
        <div style={{width:8,height:8,borderRadius:99,background:group.color,flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:group.color,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:"0.05em"}}>{group.label}</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{group.desc}</div>
        </div>
        {hasMaster && <span style={{fontSize:12,color:"#f59e0b",flexShrink:0}} title="Data master">★</span>}
        <span style={{fontSize:12,color:"#475569",flexShrink:0,transform:isExpanded?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
      </div>

      {/* Expanded content */}
      {isExpanded && (
        <div style={{padding:"10px 12px",animation:"fadeIn .2s ease"}}>
          {group.tech && (
            <div style={{fontSize:9,color:"#475569",fontFamily:"'DM Mono',monospace",marginBottom:8,padding:"3px 8px",background:"#0f172a",borderRadius:6,display:"inline-block"}}>{group.tech}</div>
          )}

          {/* Master data */}
          {hasMaster && (
            <div style={{marginBottom:10,padding:"8px 10px",background:"#f59e0b"+"0a",border:"1px solid #f59e0b"+"20",borderRadius:10}}>
              <div style={{fontSize:9,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5,fontFamily:"'DM Mono',monospace"}}>★ Master de</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {group.master.map(function(m,i){
                  return <span key={i} style={{fontSize:10,color:"#cbd5e1",background:"#0f172a",padding:"2px 8px",borderRadius:6}}>{m}</span>;
                })}
              </div>
            </div>
          )}

          {/* Sub-items */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {group.items.map(function(item){
              return <SubItem key={item.id} item={item}/>;
            })}
          </div>
        </div>
      )}

      {/* Collapsed preview */}
      {!isExpanded && !dim && (
        <div style={{padding:"6px 16px 12px",display:"flex",gap:8,flexWrap:"wrap"}}>
          {group.items.slice(0,4).map(function(item){
            return <span key={item.id} style={{fontSize:14}} title={item.label}>{item.icon}</span>;
          })}
          {group.items.length>4 && <span style={{fontSize:10,color:"#475569"}}>+{group.items.length-4}</span>}
        </div>
      )}
    </div>
  );
}

function FlowArrow({ conn, isActive }) {
  var dim = !isActive;
  var isDashed = conn.type==="dashed";
  var isDotted = conn.type==="dotted";
  return (
    <div style={{
      display:"flex",alignItems:"center",gap:6,
      padding:"5px 10px",background:"#1e293b",borderRadius:8,
      border:"1px solid #334155",fontSize:10,
      opacity:dim?0.15:1,transition:"opacity .3s",
    }}>
      <span style={{fontWeight:700,color:"#94a3b8",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",fontSize:9}}>{conn.from}</span>
      <svg width="24" height="10" viewBox="0 0 24 10" style={{flexShrink:0}}>
        <line x1="0" y1="5" x2="17" y2="5" stroke={isDotted?"#334155":(isDashed?"#475569":"#64748b")} strokeWidth="1.5"
          strokeDasharray={isDotted?"2 3":(isDashed?"4 3":"none")}>
          {!isDotted && <animate attributeName="stroke-dashoffset" from="14" to="0" dur="2s" repeatCount="indefinite"/>}
        </line>
        <polygon points="16,2 24,5 16,8" fill={isDotted?"#334155":(isDashed?"#475569":"#64748b")}/>
      </svg>
      <span style={{fontWeight:700,color:"#94a3b8",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",fontSize:9}}>{conn.to}</span>
      <span style={{color:"#334155"}}>|</span>
      <span style={{color:"#64748b",fontSize:9}}>{conn.label}</span>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════ */

function App() {
  var ps = useState("all");    var process = ps[0]; var setProcess = ps[1];
  var es = useState("core");   var expanded = es[0]; var setExpanded = es[1];

  var pf = PROCESS_FILTERS.filter(function(p){ return p.id===process; })[0];
  var activeGroups = pf ? pf.groups : null;

  function isGroupActive(gid) {
    if (!activeGroups) return true;
    return activeGroups.indexOf(gid) !== -1;
  }
  function isConnActive(conn) {
    if (!activeGroups) return true;
    return activeGroups.indexOf(conn.from)!==-1 && activeGroups.indexOf(conn.to)!==-1;
  }
  function toggleGroup(gid) {
    setExpanded(expanded===gid?null:gid);
  }

  /* Layout order matches the PowerPoint: Actors → Interface → Core+Integrator → CRM → Services → ERP → Interno */
  var layoutOrder = ["actors","interface","core","integrator","crm","services","erp","interno"];

  return (
    <div style={{background:"#0f172a",minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#1e293b 0%,#0f172a 100%)",borderBottom:"1px solid #334155",padding:"20px 20px 16px"}}>
        <div style={{maxWidth:800,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <a href="index.html" style={{textDecoration:"none",color:"#64748b",fontSize:12}}>← Inicio</a>
          </div>
          <h1 style={{fontSize:22,fontWeight:700,color:"#f1f5f9",letterSpacing:"-0.02em",lineHeight:1.2}}>Arquitectura del Ecosistema Digital</h1>
          <p style={{fontSize:12,color:"#64748b",marginTop:4,lineHeight:1.5}}>
            Visión implementada del ecosistema IAI — 10 sistemas integrados, dual-master
          </p>
          {/* Dual master summary mini */}
          <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",background:"#f97316"+"12",border:"1px solid #f97316"+"25",borderRadius:8}}>
              <span style={{width:6,height:6,borderRadius:99,background:"#f97316"}}/>
              <span style={{fontSize:10,color:"#f97316",fontWeight:600,fontFamily:"'DM Mono',monospace"}}>HubSpot</span>
              <span style={{fontSize:10,color:"#64748b"}}>Cerebro de negocio</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",background:"#10b981"+"12",border:"1px solid #10b981"+"25",borderRadius:8}}>
              <span style={{width:6,height:6,borderRadius:99,background:"#10b981"}}/>
              <span style={{fontSize:10,color:"#10b981",fontWeight:600,fontFamily:"'DM Mono',monospace"}}>Supabase</span>
              <span style={{fontSize:10,color:"#64748b"}}>Motor operativo</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",background:"#ef4444"+"12",border:"1px solid #ef4444"+"25",borderRadius:8}}>
              <span style={{width:6,height:6,borderRadius:99,background:"#ef4444"}}/>
              <span style={{fontSize:10,color:"#ef4444",fontWeight:600,fontFamily:"'DM Mono',monospace"}}>n8n</span>
              <span style={{fontSize:10,color:"#64748b"}}>Integrador</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"16px 16px 40px"}}>

        {/* Process filter */}
        <div style={{marginBottom:16,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:6,paddingBottom:4}}>
            {PROCESS_FILTERS.map(function(p){
              var active = process===p.id;
              return (
                <button key={p.id}
                  onClick={function(){ setProcess(p.id); }}
                  style={{
                    padding:"6px 12px",borderRadius:8,fontSize:11,fontWeight:active?600:400,
                    background:active?"#f97316":"#1e293b",color:active?"white":"#94a3b8",
                    border:"1px solid "+(active?"#f97316":"#334155"),
                    cursor:"pointer",transition:"all .15s",fontFamily:"'DM Sans',sans-serif",
                    whiteSpace:"nowrap",flexShrink:0,
                  }}>
                  {p.icon} {p.label}
                </button>
              );
            })}
          </div>
        </div>

        {/* ═══ DIAGRAM — VERTICAL STACK ═══ */}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {layoutOrder.map(function(gid,idx){
            var group = GROUPS.filter(function(g){ return g.id===gid; })[0];
            if (!group) return null;
            var active = isGroupActive(gid);

            /* Visual connectors between groups */
            var showConnector = idx > 0;
            var prevActive = idx>0 && isGroupActive(layoutOrder[idx-1]);
            var connDim = !active || !prevActive;

            return (
              <div key={gid}>
                {showConnector && (
                  <div style={{display:"flex",justifyContent:"center",padding:"2px 0",opacity:connDim?0.15:1,transition:"opacity .3s"}}>
                    <svg width="2" height="16" viewBox="0 0 2 16">
                      <line x1="1" y1="0" x2="1" y2="16" stroke={group.color+"60"} strokeWidth="2" strokeDasharray="3 3">
                        <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1.5s" repeatCount="indefinite"/>
                      </line>
                    </svg>
                  </div>
                )}
                <GroupCard
                  group={group}
                  isActive={active}
                  isExpanded={expanded===gid}
                  onToggle={function(){ toggleGroup(gid); }}
                />
              </div>
            );
          })}
        </div>

        {/* ═══ CONNECTION TABLE ═══ */}
        <div style={{marginTop:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:6,height:6,borderRadius:99,background:"#f59e0b"}}/>
            <span style={{fontSize:10,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'DM Mono',monospace"}}>Flujo de datos</span>
            <span style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{CONNECTIONS.length} conexiones</span>
            <div style={{flex:1,height:1,background:"#334155"}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {CONNECTIONS.map(function(c,i){
              return <FlowArrow key={i} conn={c} isActive={isConnActive(c)}/>;
            })}
          </div>
        </div>

        {/* ═══ DUAL MASTER DETAIL ═══ */}
        <div style={{marginTop:24,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"#f97316"+"0a",border:"1px solid #f97316"+"20",borderRadius:14,padding:"14px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#f97316",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,fontFamily:"'DM Mono',monospace"}}>🟠 HubSpot manda en</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {["Productos y cursos","Empresas y tramos","Tipo de membresía","Pipeline comercial","Datos maestros"].map(function(t,i){
                return <div key={i} style={{fontSize:10,color:"#cbd5e1",display:"flex",gap:4}}><span style={{color:"#f97316"}}>★</span>{t}</div>;
              })}
            </div>
          </div>
          <div style={{background:"#10b981"+"0a",border:"1px solid #10b981"+"20",borderRadius:14,padding:"14px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#10b981",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,fontFamily:"'DM Mono',monospace"}}>🟢 Supabase manda en</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {["Autenticación","Inscripciones","Pagos y checkout","Diplomas y storage","Créditos formativos"].map(function(t,i){
                return <div key={i} style={{fontSize:10,color:"#cbd5e1",display:"flex",gap:4}}><span style={{color:"#10b981"}}>★</span>{t}</div>;
              })}
            </div>
          </div>
        </div>

        {/* Legend */}
        <div style={{marginTop:20,padding:"12px 14px",background:"#1e293b",borderRadius:12,border:"1px solid #334155"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:12,fontSize:10,color:"#64748b"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:16,height:2,background:"#64748b",borderRadius:1}}/> Conexión directa</div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:16,height:2,background:"#475569",borderRadius:1,borderTop:"2px dashed #475569"}}/> Webhook / async</div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:"#f59e0b"}}>★</span> Data master</div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{color:"#a855f7",fontSize:9,fontFamily:"'DM Mono',monospace",background:"#a855f7"+"18",padding:"1px 5px",borderRadius:3}}>Fase 2</span> En desarrollo</div>
          </div>
        </div>

        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
