<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IAI · Arquitectura del Sistema</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:#0f172a;font-family:'DM Sans',system-ui,sans-serif;color:#e2e8f0}
    #root{min-height:100%}
    .iai-nav{position:sticky;top:0;z-index:999;background:#1e293b;border-bottom:1px solid #334155;box-shadow:0 1px 3px rgba(0,0,0,.3)}
    .iai-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:24px;height:44px;overflow-x:auto}
    .iai-nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;font-size:12px;font-weight:600;color:#f1f5f9;white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace}
    .iai-nav-dot{width:8px;height:8px;border-radius:99px;background:#f97316;flex-shrink:0}
    .iai-nav-links{display:flex;gap:2px;align-items:center}
    .iai-nav-links a{text-decoration:none;font-size:12px;color:#94a3b8;padding:4px 10px;border-radius:6px;white-space:nowrap;transition:background .15s,color .15s}
    .iai-nav-links a:hover{background:#334155;color:#f1f5f9}
    .iai-nav-links a.active{background:#f97316;color:white;font-weight:500}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes dashAnim{from{stroke-dashoffset:12}to{stroke-dashoffset:0}}
  </style>
  <script>
  document.addEventListener('DOMContentLoaded',function(){
    var cur=window.location.pathname.split('/').pop()||'index.html';
    document.querySelectorAll('.iai-nav-links a').forEach(function(a){
      if(a.getAttribute('href')===cur)a.classList.add('active');
    });
  });
  </script>
</head>
<body>
<nav class="iai-nav">
  <div class="iai-nav-inner">
    <a class="iai-nav-logo" href="index.html">
      <span class="iai-nav-dot"></span>
      <span>IAI · Documentación</span>
    </a>
    <div class="iai-nav-links">
      <a href="index.html">Inicio</a>
      <a href="inventario.html">Procesos</a>
      <a href="issues.html">Incidentes</a>
      <a href="arquitectura.html">Arquitectura</a>
    </div>
  </div>
</nav>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ═══════════════════════════════════════════
   NODE DEFINITIONS — positions in viewBox 0 0 420 820
   ═══════════════════════════════════════════ */

var NODES = {
  usuarios:  { x:30,  y:15,  w:130, h:46, icon:"👤", label:"Socios",       sub:"Individuales y corporativos", color:"#64748b" },
  admin:     { x:260, y:15,  w:130, h:46, icon:"🏛️", label:"Admin IAI",    sub:"Gestión interna",             color:"#f43f5e" },

  portal:    { x:30,  y:95,  w:290, h:72, icon:"🟣", label:"Portal WeWeb", sub:"Dashboard · Accesos · Carrito · Corp. · Admin", color:"#8b5cf6", big:true },

  redsys:    { x:335, y:105, w:75,  h:52, icon:"💳", label:"Redsys",       sub:"TPV pago",                    color:"#f59e0b" },

  supabase:  { x:30,  y:220, w:175, h:90, icon:"🟢", label:"Supabase",     sub:"BD · Auth · Edge Fn · Storage · Créditos formativos", color:"#10b981", big:true,
    detail:"Motor operativo. Master de: autenticación, inscripciones, pagos, diplomas, créditos formativos y saldos." },
  n8n:       { x:225, y:220, w:185, h:90, icon:"🔴", label:"n8n",          sub:"Sync · Webhooks · Cron · Workflows", color:"#ef4444", big:true,
    detail:"Integrador. Sincroniza Supabase ↔ HubSpot bidireccionalmente. Publica a WordPress y Moodle. Gestiona cron jobs." },

  hubspot:   { x:55,  y:380, w:250, h:72, icon:"🟠", label:"HubSpot CRM", sub:"Contactos · Productos · Deals · Comunicaciones", color:"#f97316", big:true,
    detail:"Cerebro de negocio. Master de: productos, empresas, tramos, membresías, deals, datos maestros." },

  wordpress: { x:10,  y:500, w:120, h:50, icon:"🌐", label:"WordPress",   sub:"Web pública",    color:"#3b82f6" },
  moodle:    { x:148, y:500, w:120, h:50, icon:"📚", label:"Moodle",      sub:"Campus virtual",  color:"#06b6d4" },
  bc:        { x:286, y:500, w:124, h:50, icon:"📄", label:"Bus. Central", sub:"Contabilidad",   color:"#6366f1" },

  nirestream:{ x:10,  y:568, w:120, h:42, icon:"📺", label:"Nirestream",  sub:"Streaming",       color:"#a855f7", phase2:true },
  publicac:  { x:148, y:568, w:120, h:42, icon:"📖", label:"Publicaciones",sub:"PDFs protegidos", color:"#3b82f6" },
  interno:   { x:286, y:568, w:124, h:42, icon:"🛠️", label:"Interno",     sub:"Admin + Reporting",color:"#f43f5e" },
};

/* ═══════════════════════════════════════════
   CONNECTIONS — [fromId, toId, path data, label, type, color]
   Paths are hand-tuned SVG path strings
   ═══════════════════════════════════════════ */

var CONNS = [
  // Actors → Portal
  { from:"usuarios", to:"portal",   d:"M95,61 L95,95",         label:"",              type:"solid",  color:"#64748b" },
  { from:"admin",    to:"portal",   d:"M325,61 L280,95",       label:"",              type:"solid",  color:"#f43f5e" },
  // Admin → HubSpot (direct, right side)
  { from:"admin",    to:"hubspot",  d:"M390,38 L390,405 L305,405", label:"gestión diaria", type:"solid", color:"#f43f5e" },

  // Portal → Supabase (main flow)
  { from:"portal",   to:"supabase", d:"M120,167 L120,220",     label:"CRUD · Auth",   type:"solid",  color:"#8b5cf6" },

  // Portal → Redsys (redirect to pay)
  { from:"portal",   to:"redsys",   d:"M320,131 L335,131",     label:"redirige",      type:"solid",  color:"#f59e0b" },
  // Redsys → Supabase (webhook confirmation via Edge Fn)
  { from:"redsys",   to:"supabase", d:"M372,157 L372,185 L180,185 L180,220", label:"webhook pago → Edge Fn", type:"dashed", color:"#f59e0b" },
  // Redsys → Portal (redirect user back)
  { from:"redsys",   to:"portal",   d:"M335,115 L320,115",     label:"vuelve",        type:"dotted", color:"#94a3b8" },

  // Supabase ↔ n8n (bidirectional)
  { from:"supabase", to:"n8n",      d:"M205,255 L225,255",     label:"webhooks",      type:"dashed", color:"#10b981" },
  { from:"n8n",      to:"supabase", d:"M225,275 L205,275",     label:"UPDATE",        type:"dashed", color:"#ef4444" },

  // n8n → HubSpot
  { from:"n8n",      to:"hubspot",  d:"M290,310 L240,380",     label:"PATCH · deals", type:"dashed", color:"#ef4444" },
  // HubSpot → n8n (webhooks back)
  { from:"hubspot",  to:"n8n",      d:"M270,380 L330,310",     label:"webhooks",      type:"dashed", color:"#f97316" },

  // n8n → Services
  { from:"n8n",      to:"wordpress", d:"M260,310 L70,500",     label:"POST eventos",  type:"dashed", color:"#ef4444" },
  { from:"n8n",      to:"moodle",    d:"M310,310 L208,500",    label:"cursos",        type:"dashed", color:"#ef4444" },
  { from:"n8n",      to:"bc",        d:"M370,310 L348,500",    label:"facturas",      type:"dashed", color:"#ef4444" },
];

/* ═══════════════════════════════════════════
   PROCESS FILTERS
   ═══════════════════════════════════════════ */
var FILTERS = [
  { id:"all",   label:"Todo",        icon:"🏗️", nodes:null },
  { id:"alta",  label:"Alta",        icon:"📋", nodes:["usuarios","admin","portal","supabase","n8n","hubspot","wordpress"] },
  { id:"gest",  label:"Gestión",     icon:"✏️", nodes:["usuarios","admin","portal","supabase","n8n","hubspot"] },
  { id:"prod",  label:"Productos",   icon:"📦", nodes:["admin","hubspot","n8n","wordpress","moodle","supabase"] },
  { id:"insc",  label:"Inscripciones",icon:"🎟️",nodes:["usuarios","portal","supabase","n8n","hubspot","moodle"] },
  { id:"pago",  label:"Pagos",       icon:"💰", nodes:["usuarios","portal","supabase","redsys","n8n","bc"] },
  { id:"renov", label:"Renovación",  icon:"🔄", nodes:["supabase","n8n","hubspot","bc","portal","admin"] },
];

/* ═══════════════════════════════════════════
   SVG COMPONENTS
   ═══════════════════════════════════════════ */

function ConnPath({ conn, isActive }) {
  var dim = !isActive;
  var isDashed = conn.type==="dashed";
  var isDotted = conn.type==="dotted";
  var dash = isDotted ? "2 4" : (isDashed ? "5 3" : "none");
  var sw = isDotted ? 1 : 1.5;
  var c = dim ? "#1e293b" : (conn.color||"#475569");
  return (
    <g style={{opacity:dim?0.1:1,transition:"opacity .4s"}}>
      <path d={conn.d} fill="none" stroke={c} strokeWidth={sw}
        strokeDasharray={dash} markerEnd={isDotted?"":(dim?"":"url(#arrow-"+conn.color.replace("#","")+")")}>
        {!isDotted && <animate attributeName="stroke-dashoffset" from="12" to="0" dur="2s" repeatCount="indefinite"/>}
      </path>
      {conn.label && !dim && (function(){
        var parts = conn.d.split(/[ML ]+/).filter(Boolean);
        if(parts.length<4) return null;
        var x1=parseFloat(parts[0]),y1=parseFloat(parts[1]);
        var x2=parseFloat(parts[parts.length-2]),y2=parseFloat(parts[parts.length-1]);
        var mx=(x1+x2)/2, my=(y1+y2)/2;
        return (
          <text x={mx} y={my-4} textAnchor="middle" fill="#64748b" fontSize="7" fontFamily="DM Mono,monospace">{conn.label}</text>
        );
      })()}
    </g>
  );
}

function NodeBox({ id, node, isActive, isSelected, onClick }) {
  var dim = !isActive;
  var c = node.color;
  var sel = isSelected;
  return (
    <g onClick={function(){ onClick(id); }} style={{cursor:"pointer",opacity:dim?0.15:1,transition:"opacity .4s"}}>
      {/* Shadow */}
      {sel && <rect x={node.x-2} y={node.y-2} width={node.w+4} height={node.h+4} rx={12} fill={c} fillOpacity={0.15}/>}
      {/* Box */}
      <rect x={node.x} y={node.y} width={node.w} height={node.h}
        rx={10} fill={sel?"#1e293b":"#1e293b"} stroke={sel?c:(dim?"#334155":c+"60")} strokeWidth={sel?2:1}/>
      {/* Color accent left */}
      <rect x={node.x} y={node.y} width={4} height={node.h} rx={2} fill={c} fillOpacity={dim?0.2:(sel?1:0.6)}/>
      {/* Icon */}
      <text x={node.x+14} y={node.y+(node.big?20:18)} fontSize={node.big?14:12}>{node.icon}</text>
      {/* Label */}
      <text x={node.x+30} y={node.y+(node.big?20:18)} fill={sel?c:"#e2e8f0"} fontSize={node.big?11:10} fontWeight="600" fontFamily="DM Mono,monospace">{node.label}</text>
      {/* Sub */}
      {node.sub && <text x={node.x+14} y={node.y+(node.big?36:33)} fill="#64748b" fontSize="7" fontFamily="DM Sans,sans-serif">{node.sub}</text>}
      {/* Phase 2 badge */}
      {node.phase2 && (
        <g>
          <rect x={node.x+node.w-38} y={node.y+4} width={34} height={13} rx={4} fill="#a855f7" fillOpacity={0.15} stroke="#a855f7" strokeWidth={0.5} strokeOpacity={0.4}/>
          <text x={node.x+node.w-21} y={node.y+13} textAnchor="middle" fill="#a855f7" fontSize="6" fontFamily="DM Mono,monospace" fontWeight="600">Fase 2</text>
        </g>
      )}
    </g>
  );
}

function CoreBackground({ isActive }) {
  return (
    <g style={{opacity:isActive?1:0.1,transition:"opacity .4s"}}>
      <rect x={20} y={205} width={395} height={115} rx={14} fill="#10b981" fillOpacity={0.04} stroke="#10b981" strokeWidth={1} strokeOpacity={0.15} strokeDasharray="4 3"/>
      <text x={32} y={218} fill="#10b981" fontSize="7" fontWeight="700" fontFamily="DM Mono,monospace" letterSpacing="0.08em" fillOpacity={0.5}>CORE DEL SISTEMA</text>
    </g>
  );
}

function HubspotBackground({ isActive }) {
  return (
    <g style={{opacity:isActive?1:0.1,transition:"opacity .4s"}}>
      <rect x={45} y={368} width={270} height={84} rx={14} fill="#f97316" fillOpacity={0.04} stroke="#f97316" strokeWidth={1} strokeOpacity={0.15} strokeDasharray="4 3"/>
      <text x={57} y={380} fill="#f97316" fontSize="7" fontWeight="700" fontFamily="DM Mono,monospace" letterSpacing="0.08em" fillOpacity={0.5}>CEREBRO DE NEGOCIO</text>
    </g>
  );
}

/* ═══════════════════════════════════════════
   DETAIL PANEL (below diagram)
   ═══════════════════════════════════════════ */

function DetailPanel({ nodeId, node, onClose }) {
  var c = node.color;
  return (
    <div style={{animation:"fadeIn .2s ease",background:"#1e293b",border:"2px solid "+c+"40",borderRadius:14,padding:"16px",marginTop:12,position:"relative"}}>
      <button onClick={onClose} style={{position:"absolute",top:10,right:12,background:"none",border:"none",fontSize:16,color:"#64748b",cursor:"pointer"}}>✕</button>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:22}}>{node.icon}</span>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:c}}>{node.label}</div>
          <div style={{fontSize:10,color:"#64748b"}}>{node.sub}</div>
        </div>
      </div>
      {node.detail && <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:8}}>{node.detail}</p>}
      {/* Connections */}
      <div style={{fontSize:9,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5,fontFamily:"DM Mono,monospace"}}>Conexiones</div>
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        {CONNS.filter(function(c2){ return (c2.from===nodeId||c2.to===nodeId) && c2.label; }).map(function(c2,i){
          var otherId = c2.from===nodeId ? c2.to : c2.from;
          var other = NODES[otherId];
          var out = c2.from===nodeId;
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#94a3b8"}}>
              <span style={{color:out?"#10b981":"#3b82f6",fontFamily:"DM Mono,monospace",fontSize:9,fontWeight:700}}>{out?"→":"←"}</span>
              <span style={{fontWeight:600,color:other.color}}>{other.label}</span>
              <span style={{color:"#334155"}}>·</span>
              <span style={{color:"#64748b"}}>{c2.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */

function App() {
  var ps = useState("all"); var process = ps[0]; var setProcess = ps[1];
  var ss = useState(null);  var selected = ss[0]; var setSelected = ss[1];

  var filt = FILTERS.filter(function(f){ return f.id===process; })[0];
  var activeNodes = filt ? filt.nodes : null;

  function isNodeActive(nid) {
    if (!activeNodes) return true;
    return activeNodes.indexOf(nid) !== -1;
  }
  function isConnActive(conn) {
    if (!activeNodes) return true;
    return activeNodes.indexOf(conn.from)!==-1 && activeNodes.indexOf(conn.to)!==-1;
  }
  function clickNode(id) { setSelected(selected===id?null:id); }

  var nodeIds = Object.keys(NODES);

  // Unique arrow markers per color
  var markerColors = {};
  CONNS.forEach(function(c){ if(c.color) markerColors[c.color.replace("#","")]=c.color; });

  return (
    <div style={{background:"#0f172a",minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#1e293b 0%,#0f172a 100%)",borderBottom:"1px solid #334155",padding:"16px 20px 12px"}}>
        <div style={{maxWidth:440,margin:"0 auto"}}>
          <a href="index.html" style={{textDecoration:"none",color:"#64748b",fontSize:12}}>← Inicio</a>
          <h1 style={{fontSize:19,fontWeight:700,color:"#f1f5f9",letterSpacing:"-0.02em",marginTop:6}}>Arquitectura del Ecosistema Digital</h1>
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
            <span style={{fontSize:9,color:"#f97316",background:"#f97316"+"12",border:"1px solid #f97316"+"25",padding:"3px 8px",borderRadius:6,fontFamily:"DM Mono,monospace",fontWeight:600}}>🟠 HubSpot → Cerebro de negocio</span>
            <span style={{fontSize:9,color:"#10b981",background:"#10b981"+"12",border:"1px solid #10b981"+"25",padding:"3px 8px",borderRadius:6,fontFamily:"DM Mono,monospace",fontWeight:600}}>🟢 Supabase → Motor operativo</span>
            <span style={{fontSize:9,color:"#ef4444",background:"#ef4444"+"12",border:"1px solid #ef4444"+"25",padding:"3px 8px",borderRadius:6,fontFamily:"DM Mono,monospace",fontWeight:600}}>🔴 n8n → Integrador</span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:440,margin:"0 auto",padding:"12px 10px 40px"}}>

        {/* Process filter */}
        <div style={{marginBottom:12,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:5,paddingBottom:4}}>
            {FILTERS.map(function(f){
              var active = process===f.id;
              return (
                <button key={f.id} onClick={function(){ setProcess(f.id); setSelected(null); }}
                  style={{padding:"5px 10px",borderRadius:7,fontSize:10,fontWeight:active?600:400,
                    background:active?"#f97316":"#1e293b",color:active?"white":"#94a3b8",
                    border:"1px solid "+(active?"#f97316":"#334155"),cursor:"pointer",
                    fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap",flexShrink:0}}>
                  {f.icon} {f.label}
                </button>
              );
            })}
          </div>
        </div>

        {/* ═══ SVG DIAGRAM ═══ */}
        <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",overflow:"hidden"}}>
          <svg viewBox="0 0 420 630" style={{width:"100%",height:"auto",display:"block"}}>
            <defs>
              {Object.keys(markerColors).map(function(key){
                return (
                  <marker key={key} id={"arrow-"+key} markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <polygon points="0,0 6,3 0,6" fill={markerColors[key]}/>
                  </marker>
                );
              })}
            </defs>

            {/* Background zones */}
            <CoreBackground isActive={isNodeActive("supabase")||isNodeActive("n8n")}/>
            <HubspotBackground isActive={isNodeActive("hubspot")}/>

            {/* Services label */}
            <text x={22} y={496} fill="#3b82f6" fontSize="7" fontWeight="700" fontFamily="DM Mono,monospace" letterSpacing="0.08em" fillOpacity={isNodeActive("wordpress")?0.5:0.1} style={{transition:"fill-opacity .4s"}}>SERVICIOS</text>

            {/* Connection paths (behind nodes) */}
            {CONNS.map(function(conn,i){
              return <ConnPath key={i} conn={conn} isActive={isConnActive(conn)}/>;
            })}

            {/* Nodes */}
            {nodeIds.map(function(nid){
              var node = NODES[nid];
              return <NodeBox key={nid} id={nid} node={node} isActive={isNodeActive(nid)} isSelected={selected===nid} onClick={clickNode}/>;
            })}

            {/* Bidirectional label between Supabase and n8n */}
            <g style={{opacity:(isNodeActive("supabase")&&isNodeActive("n8n"))?1:0.1,transition:"opacity .4s"}}>
              <text x={215} y={248} textAnchor="middle" fill="#475569" fontSize="8" fontFamily="DM Mono,monospace">◀═══▶</text>
            </g>

            {/* Legend at bottom */}
            <g transform="translate(10,598)">
              <line x1="0" y1="8" x2="18" y2="8" stroke="#64748b" strokeWidth="1.5"/>
              <text x="22" y="11" fill="#64748b" fontSize="7" fontFamily="DM Mono,monospace">Directo</text>
              <line x1="80" y1="8" x2="98" y2="8" stroke="#64748b" strokeWidth="1.5" strokeDasharray="5 3"/>
              <text x="102" y="11" fill="#64748b" fontSize="7" fontFamily="DM Mono,monospace">Webhook / async</text>
              <line x1="200" y1="8" x2="218" y2="8" stroke="#64748b" strokeWidth="1" strokeDasharray="2 4"/>
              <text x="222" y="11" fill="#64748b" fontSize="7" fontFamily="DM Mono,monospace">Redirect</text>
              <rect x="280" y="2" width="12" height="12" rx="3" fill="#a855f7" fillOpacity="0.15" stroke="#a855f7" strokeWidth="0.5"/>
              <text x="296" y="11" fill="#64748b" fontSize="7" fontFamily="DM Mono,monospace">Fase 2</text>
              <text x="340" y="11" fill="#f59e0b" fontSize="8">★</text>
              <text x="350" y="11" fill="#64748b" fontSize="7" fontFamily="DM Mono,monospace">Master</text>
            </g>
          </svg>
        </div>

        {/* Detail panel */}
        {selected && NODES[selected] && (
          <DetailPanel nodeId={selected} node={NODES[selected]} onClose={function(){ setSelected(null); }}/>
        )}

        {/* Payment flow callout */}
        <div style={{marginTop:16,padding:"12px 14px",background:"#1e293b",borderRadius:12,border:"1px solid #f59e0b"+"25"}}>
          <div style={{fontSize:9,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6,fontFamily:"DM Mono,monospace"}}>💳 Flujo de pago con tarjeta</div>
          <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.7}}>
            <span style={{color:"#8b5cf6"}}>Portal</span> (carrito) →
            <span style={{color:"#10b981"}}> Supabase</span> (crea carrito) →
            <span style={{color:"#10b981"}}> Edge Fn</span> (initiate-payment) →
