// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function SystemTag({ sys }) {
  var color = SYSTEM_COLORS[sys] || "#94a3b8";
  var label = SYSTEM_LABELS[sys] || sys;
  return (
    <span className="sys-tag" style={{
      background:color+"18",
      border:"1px solid "+color+"44",
      color:color,
    }}>
      {label}
    </span>
  );
}

function FaseBadge({ fase }) {
  var c = FASE_COLORS[fase] || FASE_COLORS.acceso;
  var label = FASE_LABELS[fase] || fase;
  return (
    <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,
      fontSize:10,fontWeight:500,letterSpacing:"0.03em",whiteSpace:"nowrap",
      background:c.bg,color:c.text,border:"1px solid "+c.border}}>
      {label}
    </span>
  );
}

function WipBadge() {
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",
      borderRadius:99,fontSize:10,fontWeight:500,
      background:"#fef3c7",color:"#92400e",border:"1px solid #fde68a",whiteSpace:"nowrap"}}>
      🚧 En construcción
    </span>
  );
}

// Phase header spanning both columns
function PhaseHeaderRow({ fase }) {
  var c = FASE_COLORS[fase] || FASE_COLORS.acceso;
  var label = FASE_LABELS[fase] || fase;
  return (
    <React.Fragment>
      <div className="phase-cell phase-cell-left">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:7,height:7,borderRadius:99,background:c.text,flexShrink:0}}/>
          <span style={{fontSize:10,fontWeight:600,color:c.text,
            fontFamily:"DM Mono, monospace",textTransform:"uppercase",letterSpacing:"0.07em"}}>
            {label}
          </span>
          <div style={{flex:1,height:1,background:c.border}}/>
        </div>
      </div>
      <div className="phase-cell">
        <div style={{height:7}}/>
      </div>
    </React.Fragment>
  );
}

function StepRow({ step, idx, hoveredRow, setHoveredRow }) {
  var sc = SYSTEM_COLORS[step.sys] || "#94a3b8";
  var isHovered = hoveredRow === idx;
  var rowBg = isHovered ? (step.wip ? "#fffbeb" : "#f8fafc") : (step.wip ? "#fffef5" : "white");
  var leftBorder = step.wip ? "#fbbf24" : sc;

  return (
    <React.Fragment>
      {/* LEFT: functional / process */}
      <div
        className="step-row-left"
        style={{background:rowBg, borderLeft:"3px solid "+leftBorder+"55"}}
        onMouseEnter={function(){setHoveredRow(idx);}}
        onMouseLeave={function(){setHoveredRow(null);}}>

        {/* Timeline line */}
        <div style={{
          position:"absolute",left:27,top:0,bottom:0,
          width:2,background:"#e2e8f0",zIndex:0,
        }}/>

        <div style={{display:"flex",gap:10,alignItems:"flex-start",position:"relative",zIndex:1}}>
          {/* Step number */}
          <div className="step-num" style={{
            background:isHovered ? (step.wip ? "#fbbf24" : sc) : (step.wip ? "#fef3c7" : "#f1f5f9"),
            border:"2px solid "+(isHovered ? (step.wip ? "#fbbf24" : sc) : (step.wip ? "#fde68a" : "#e2e8f0")),
            color:isHovered ? "white" : (step.wip ? "#92400e" : "#94a3b8"),
            transition:"all .2s",
            marginTop:1,
          }}>
            {step.wip ? "🚧" : idx+1}
          </div>

          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
              <FaseBadge fase={step.fase}/>
              {step.wip && <WipBadge/>}
            </div>
            <p style={{fontSize:12,color:"#94a3b8",fontWeight:400,marginBottom:2,lineHeight:1.3}}>
              {step.who}
            </p>
            <p style={{fontSize:13,fontWeight:600,color:"#1e293b",lineHeight:1.4,marginBottom:6}}>
              {step.what}
            </p>
            <p style={{fontSize:12,color:"#64748b",lineHeight:1.6}}>
              {step.why}
            </p>
          </div>
        </div>
      </div>

      {/* RIGHT: system / technical */}
      <div
        className="step-row-right"
        style={{background:rowBg}}
        onMouseEnter={function(){setHoveredRow(idx);}}
        onMouseLeave={function(){setHoveredRow(null);}}>

        <div style={{paddingLeft:4}}>
          {/* System tags */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
            {(step.techSystems || [step.sys]).map(function(s){
              return <SystemTag key={s} sys={s}/>;
            })}
          </div>

          {/* Tech description */}
          <p style={{
            fontSize:12,color:step.wip ? "#78350f" : "#64748b",lineHeight:1.6,
            fontFamily:"DM Mono, monospace",
            padding:"8px 10px",
            background:step.wip ? "#fef9c3" : "#f8fafc",
            borderRadius:7,
            border:"1px solid "+(step.wip ? "#fde68a" : "#e2e8f0"),
          }}>
            {step.tech}
          </p>
        </div>
      </div>
    </React.Fragment>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  var sa = useState("mod_individual"); var scenario = sa[0]; var setScenario = sa[1];
  var ha = useState(null); var hoveredRow = ha[0]; var setHoveredRow = ha[1];

  var steps = ALL_STEPS.filter(function(s){ return s.scenario === scenario; });
  var sc = SCENARIOS[scenario];
  var wipCount = steps.filter(function(s){ return s.wip; }).length;

  var ac04 = ["mod_individual","mod_admin"];
  var ac05 = ["baja_individual","baja_corporativa"];

  // Build rows: insert phase headers when fase changes
  var rows = [];
  var lastFase = null;
  steps.forEach(function(step, idx){
    var showHeader = step.fase !== lastFase;
    lastFase = step.fase;
    if(showHeader){
      rows.push({ type:"phase", fase:step.fase, key:"phase-"+step.fase+"-"+idx });
    }
    rows.push({ type:"step", step:step, idx:idx, key:"step-"+idx });
  });

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>

      {/* ── HEADER ── */}
      <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"16px 20px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <a href="index.html" className="back-link">← Todos los procesos</a>
                <span style={{color:"#e2e8f0"}}>·</span>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"DM Mono, monospace"}}>AC-04 · AC-05</span>
              </div>
              <h1 style={{fontSize:20,fontWeight:600,color:"#0f172a",letterSpacing:"-0.02em"}}>
                ✏️ Modificación y Baja de Socios
              </h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:2}}>
                Gestión del ciclo de vida del socio una vez dado de alta
              </p>
            </div>
          </div>

          {/* Scenario selectors */}
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:10}}>
            {/* AC-04 */}
            <div>
              <div style={{fontSize:10,color:"#94a3b8",fontFamily:"DM Mono,monospace",
                textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>
                AC-04 · Modificación
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {ac04.map(function(key){
                  var s = SCENARIOS[key]; var active = scenario === key;
                  return (
                    <button key={key} className="toggle-btn"
                      onClick={function(){setScenario(key);setHoveredRow(null);}}
                      style={{padding:"6px 13px",borderRadius:8,fontSize:12,
                        fontWeight:active?600:400,
                        background:active?s.color:"white",
                        color:active?"white":"#64748b",
                        border:"1px solid "+(active?s.color:"#e2e8f0")}}>
                      {s.icon} {s.label}
                    </button>
                  );
                })}
              </div>
            </div>
            {/* AC-05 */}
            <div>
              <div style={{fontSize:10,color:"#94a3b8",fontFamily:"DM Mono,monospace",
                textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>
                AC-05 · Baja
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {ac05.map(function(key){
                  var s = SCENARIOS[key]; var active = scenario === key;
                  var hasWip = ALL_STEPS.filter(function(x){return x.scenario===key&&x.wip;}).length > 0;
                  return (
                    <button key={key} className="toggle-btn"
                      onClick={function(){setScenario(key);setHoveredRow(null);}}
                      style={{padding:"6px 13px",borderRadius:8,fontSize:12,
                        fontWeight:active?600:400,
                        background:active?s.color:"white",
                        color:active?"white":"#64748b",
                        border:"1px solid "+(active?s.color:"#e2e8f0"),
                        position:"relative"}}>
                      {s.icon} {s.label}
                      {hasWip && (
                        <span style={{position:"absolute",top:-4,right:-4,
                          width:8,height:8,borderRadius:99,
                          background:"#f59e0b",border:"1px solid white"}}/>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Active scenario pill */}
          <div style={{marginTop:12,padding:"7px 12px",
            background:sc.color+"0f",border:"1px solid "+sc.color+"30",
            borderRadius:8,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{width:5,height:5,borderRadius:99,background:sc.color,flexShrink:0}}/>
            <span style={{fontSize:12,color:sc.color}}>{sc.desc}</span>
            <span style={{fontSize:12,color:"#94a3b8"}}>· {steps.length} pasos</span>
            {wipCount > 0 && (
              <span style={{fontSize:11,color:"#92400e",background:"#fef3c7",
                padding:"1px 8px",borderRadius:99,border:"1px solid #fde68a"}}>
                🚧 {wipCount} paso{wipCount>1?"s":""} en construcción
              </span>
            )}
          </div>
        </div>
      </div>

      {/* ── FLOW ── */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px"}}>

        {/* Grid container */}
        <div style={{
          background:"white",
          border:"1px solid #e2e8f0",
          borderRadius:12,
          overflow:"hidden",
          boxShadow:"0 1px 4px rgba(0,0,0,.05)",
        }}>
          {/* Column headers */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
            <div className="col-header col-header-left" style={{
              display:"flex",alignItems:"center",gap:7,
              borderRight:"1px solid #e2e8f0",
            }}>
              <span style={{
                width:6,height:6,borderRadius:99,background:"#64748b",
                display:"inline-block",flexShrink:0,
              }}/>
              Qué ocurre (proceso)
            </div>
            <div className="col-header col-header-right" style={{
              display:"flex",alignItems:"center",gap:7,
            }}>
              <span style={{
                width:6,height:6,borderRadius:99,background:"#10b981",
                display:"inline-block",flexShrink:0,
              }}/>
              Qué hace el sistema
            </div>
          </div>

          {/* Rows */}
          <div className="flow-grid">
            {rows.map(function(row){
              if(row.type === "phase"){
                return <PhaseHeaderRow key={row.key} fase={row.fase}/>;
              }
              return (
                <StepRow
                  key={row.key}
                  step={row.step}
                  idx={row.idx}
                  hoveredRow={hoveredRow}
                  setHoveredRow={setHoveredRow}
                />
              );
            })}
          </div>

          {/* End row */}
          <div style={{
            padding:"14px 16px",
            borderTop:"1px solid #f1f5f9",
            background:wipCount>0?"#fffbeb":"#f0fdf4",
            display:"flex",alignItems:"center",gap:10,
          }}>
            <div style={{
              width:28,height:28,borderRadius:99,
              background:wipCount>0?"#f59e0b":"#10b981",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:13,flexShrink:0,color:"white",fontWeight:700,
            }}>{wipCount>0?"🚧":"✓"}</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,
                color:wipCount>0?"#92400e":"#065f46"}}>
                {wipCount>0?"Proceso parcialmente implementado":"Proceso completado"}
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:1}}>{sc.end}</div>
              {wipCount>0 && (
                <div style={{fontSize:12,color:"#92400e",marginTop:3}}>
                  {wipCount} paso{wipCount>1?"s":""} en construcción — pendiente de implementación por el equipo técnico.
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Legend */}
        <div style={{
          marginTop:20,padding:"14px 16px",
          background:"white",borderRadius:10,
          border:"1px solid #e2e8f0",
          display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap",
        }}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",
              letterSpacing:"0.06em",marginBottom:8,fontFamily:"DM Mono, monospace"}}>
              Sistemas involucrados
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["usuario","weweb","supabase","n8n","hubspot","iai_admin"].map(function(s){
                return <SystemTag key={s} sys={s}/>;
              })}
            </div>
          </div>
          <div style={{
            fontSize:12,color:"#94a3b8",lineHeight:1.6,
            borderLeft:"1px solid #f1f5f9",paddingLeft:16,
            maxWidth:380,
          }}>
            La columna izquierda describe <strong style={{color:"#475569"}}>lo que ocurre</strong> desde el punto de vista del usuario o del administrador.
            La columna derecha muestra <strong style={{color:"#475569"}}>los sistemas y las operaciones técnicas</strong> que se ejecutan en cada paso.
            {scenario==="baja_corporativa" && (
              <span style={{display:"block",marginTop:8,color:"#92400e"}}>
                <strong>✅ Baja en cascada operativa.</strong> Cuando se cambia el tipo_de_miembro de una empresa de COM a otro valor en HubSpot, todos los contactos ASC pasan automáticamente a WEB. Nota: la re-conversión no es automática si la empresa vuelve a COM.
              </span>
            )}
          </div>
        </div>

        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
