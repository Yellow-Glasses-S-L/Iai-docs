      padding:10px 16px;

      text-transform:uppercase;

      font-family:'DM Mono',monospace;

    .col-header-left{border-right:1px solid #e2e8f0;}
    .col-header-right{color:#64748b;}

    /* Row cells */
    .step-row-left,.step-row-right{
      padding:16px;
      border-bottom:1px solid #f1f5f9;
      position:relative;
      background:white;
      transition:background .15s;
    }
    .step-row-left{
      border-right:1px solid #e2e8f0;
    }
    .step-row-left.hovered,.step-row-right.hovered{
      background:#fafbfc;
    }

    /* Phase header row */
    .phase-cell{
      padding:8px 16px 6px;
      background:#f8fafc;
      border-bottom:1px solid #e2e8f0;
    }
    .phase-cell-left{border-right:1px solid #e2e8f0;}

    tech:"Portal procesa el token → UPDATE product_registrations: status=confirmed, confirmed_at=now. Si el usuario no tiene sesión activa: flujo de login → redirección de vuelta a la confirmación.",
    techSystems:["weweb","supabase"] },

  { scenario:"evento_pendiente", sys:"supabase", fase:"aceptacion",
    who:"El sistema",
    what:"Registra la confirmación y actualiza el aforo disponible",
    why:"La inscripción queda confirmada y el contador de plazas ocupadas se actualiza para que el panel de admin refleje la ocupación real.",
    tech:"product_registrations.status=confirmed, confirmed_at. products.current_registrations += 1. Trigger automático en Supabase.",
    techSystems:["supabase"] },

  // ── EVENTO DE PAGO ──
  { scenario:"evento_pago", sys:"weweb", fase:"inscripcion",
    who:"El usuario",
    what:"Descubre el evento en la web o el portal y se inscribe",
    why:"Algunos eventos de IAI tienen precio de inscripción. El usuario los encuentra en la web pública o en el portal y sigue el flujo estándar de compra.",
    tech:"Productos con precio > 0 en HubSpot. WordPress muestra el evento publicado vía SYNC-WP-01. Portal del socio permite la compra directa.",
    techSystems:["weweb","wordpress","hubspot"] },

  { scenario:"evento_pago", sys:"supabase", fase:"pago",
    who:"El sistema",
    what:"Procesa el pago por tarjeta o transferencia",
    why:"Los eventos de pago admiten tarjeta (inmediato) o transferencia (con confirmación de IAI). No se puede pagar con crédito formativo.",
    tech:"Flujo idéntico a matrícula de cursos. redsys-initiate-payment o transfer-initiate-payment. No aplica credit_type — los eventos no consumen crédito formativo.",
    techSystems:["supabase","redsys"] },

  { scenario:"evento_pago", sys:"supabase", fase:"confirmacion",
    who:"El sistema",
    what:"Confirma la inscripción al recibir el pago",
    why:"En cuanto se confirma el pago, el usuario queda inscrito en el evento y recibe el email de confirmación con todos los detalles.",
    tech:"deals + deal_items creados. product_registrations: status=confirmed, registration_type=standard. n8n → HubSpot deal → closedwon → email de confirmación al asistente.",
    techSystems:["supabase","n8n","hubspot"] },
];

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function SystemTag({ sys }) {
  var color = SYSTEM_COLORS[sys] || "#94a3b8";
  var label = SYSTEM_LABELS[sys] || sys;
  return (
    <span className="sys-tag" style={{
      background: color+"18",
      border: "1px solid "+color+"44",
      color: color,
    }}>
      {label}
    </span>
  );
}

function PhaseHeaderRow({ fase }) {
  var c = FASE_STYLES[fase] || FASE_STYLES.acceso;
  return (
    <React.Fragment>
      <div className="phase-cell phase-cell-left">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:7,height:7,borderRadius:99,background:c.text,flexShrink:0}}/>
          <span style={{fontSize:10,fontWeight:600,color:c.text,
            fontFamily:"DM Mono, monospace",textTransform:"uppercase",letterSpacing:"0.07em"}}>
            {c.label}
          </span>
          <div style={{flex:1,height:1,background:c.border}}/>
        </div>
      </div>
      <div className="phase-cell">
        <div style={{height:7}}/>
      </div>
    </React.Fragment>
  );
}

function StepRow({ step, idx, hoveredRow, setHoveredRow }) {
  var sc = SYSTEM_COLORS[step.sys] || "#94a3b8";
  var isHovered = hoveredRow === idx;
  var rowBg = isHovered ? "#fafbfc" : "white";

  return (
    <React.Fragment>
      {/* LEFT: functional / process */}
      <div
        className={"step-row-left"+(isHovered?" hovered":"")}
        style={{background:rowBg,borderLeft:"3px solid "+sc+"55"}}
        onMouseEnter={function(){setHoveredRow(idx);}}
        onMouseLeave={function(){setHoveredRow(null);}}>

        {/* Timeline line */}
        <div style={{
          position:"absolute",left:27,top:0,bottom:0,
          width:2,background:"#e2e8f0",zIndex:0,
        }}/>

        <div style={{display:"flex",gap:10,alignItems:"flex-start",position:"relative",zIndex:1}}>
          {/* Step number dot */}
          <div className="step-num" style={{
            background: isHovered ? sc : "#f1f5f9",
            border: "2px solid "+(isHovered ? sc : "#e2e8f0"),
            color: isHovered ? "white" : "#94a3b8",
            transition:"all .2s",
            marginTop:1,
          }}>
            {idx+1}
          </div>

          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:12,color:"#94a3b8",fontWeight:400,marginBottom:2,lineHeight:1.3}}>
              {step.who}
            </p>
            <p style={{fontSize:13,fontWeight:600,color:"#1e293b",lineHeight:1.4,marginBottom:6}}>
              {step.what}
            </p>
            <p style={{fontSize:12,color:"#64748b",lineHeight:1.6}}>
              {step.why}
            </p>
          </div>
        </div>
      </div>

      {/* RIGHT: system / technical */}
      <div
        className={"step-row-right"+(isHovered?" hovered":"")}
        style={{background:rowBg}}
        onMouseEnter={function(){setHoveredRow(idx);}}
        onMouseLeave={function(){setHoveredRow(null);}}>

        <div style={{paddingLeft:4}}>
          {/* System tags */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
            {(step.techSystems||[step.sys]).map(function(s){
              return <SystemTag key={s} sys={s}/>;
            })}
          </div>

          {/* Tech description */}
          <p style={{
            fontSize:12,color:"#64748b",lineHeight:1.6,
            fontFamily:"DM Mono, monospace",
            padding:"8px 10px",
            background:"#f8fafc",
            borderRadius:7,
            border:"1px solid #e2e8f0",
          }}>
            {step.tech}
          </p>
        </div>
      </div>
    </React.Fragment>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  var sa = useState("aforo"); var scenario = sa[0]; var setScenario = sa[1];
  var ha = useState(null);   var hoveredRow = ha[0]; var setHoveredRow = ha[1];

  var steps = ALL_STEPS.filter(function(s){ return s.scenario === scenario; });
  var sc = SCENARIOS[scenario];
  var lastFase = null;

  var rows = [];
  steps.forEach(function(step, idx) {
    var showHeader = step.fase !== lastFase;
    lastFase = step.fase;
    if (showHeader) {
      rows.push({ type:"phase", fase:step.fase, key:"phase-"+step.fase+"-"+idx });
    }
    rows.push({ type:"step", step:step, idx:idx, key:"step-"+idx });
  });

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>

      {/* ── HEADER ── */}
      <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"16px 20px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>

          <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap",marginBottom:14}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <a href="index.html" className="back-link">← Todos los procesos</a>
                <span style={{color:"#e2e8f0"}}>·</span>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"DM Mono, monospace"}}>AC-09 · AC-11 · AC-12 · AC-13</span>
              </div>
              <h1 style={{fontSize:20,fontWeight:600,color:"#0f172a",letterSpacing:"-0.02em"}}>
                🎯 Inscripciones, Aforo, Eventos y Diplomas
              </h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:2}}>
                Control de plazas, cancelaciones, invitaciones a eventos y generación de diplomas
              </p>
            </div>
          </div>

          {/* Scenario selector — grouped */}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {SCENARIO_GROUPS.map(function(g) {
              return (
                <div key={g.ac}>
                  <div style={{fontSize:10,color:"#94a3b8",fontFamily:"DM Mono, monospace",
                    textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>
                    {g.ac} · {g.label}
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {g.keys.map(function(key) {
                      var s = SCENARIOS[key]; var active = scenario === key;
                      return (
                        <button key={key} className="toggle-btn"
                          onClick={function(){ setScenario(key); setHoveredRow(null); }}
                          style={{
                            padding:"6px 13px",borderRadius:8,fontSize:12,
                            fontWeight:active?600:400,
                            background:active?s.color:"white",
                            color:active?"white":"#64748b",
                            border:"1px solid "+(active?s.color:"#e2e8f0"),
                          }}>
                          {s.icon} {s.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Active scenario pill */}
          <div style={{marginTop:12,padding:"7px 12px",
            background:sc.color+"0f",border:"1px solid "+sc.color+"30",borderRadius:8,
            display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:5,height:5,borderRadius:99,background:sc.color,flexShrink:0}}/>
            <span style={{fontSize:12,color:sc.color}}>{sc.desc}</span>
            <span style={{fontSize:12,color:"#94a3b8"}}>· {steps.length} pasos</span>
          </div>
        </div>
      </div>

      {/* ── FLOW ── */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px"}}>

        <div style={{
          background:"white",
          border:"1px solid #e2e8f0",
          borderRadius:12,
          overflow:"hidden",
          boxShadow:"0 1px 4px rgba(0,0,0,.05)",
        }}>
          {/* Column headers */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
            <div className="col-header col-header-left" style={{
              display:"flex",alignItems:"center",gap:7,
              borderRight:"1px solid #e2e8f0",
            }}>
              <span style={{width:6,height:6,borderRadius:99,background:"#64748b",
                display:"inline-block",flexShrink:0}}/>
              Qué ocurre (proceso)
            </div>
            <div className="col-header col-header-right" style={{
              display:"flex",alignItems:"center",gap:7,
            }}>
              <span style={{width:6,height:6,borderRadius:99,background:"#10b981",
                display:"inline-block",flexShrink:0}}/>
              Qué hace el sistema
            </div>
          </div>

          {/* Rows */}
          <div className="flow-grid">
            {rows.map(function(row) {
              if (row.type === "phase") {
                return <PhaseHeaderRow key={row.key} fase={row.fase}/>;
              }
              return (
                <StepRow
                  key={row.key}
                  step={row.step}
                  idx={row.idx}
                  hoveredRow={hoveredRow}
                  setHoveredRow={setHoveredRow}
                />
              );
            })}
          </div>

          {/* End row */}
          <div style={{
            padding:"14px 16px",
            borderTop:"1px solid #f1f5f9",
            background:"#f0fdf4",
            display:"flex",alignItems:"center",gap:10,
          }}>
            <div style={{
              width:28,height:28,borderRadius:99,
              background:"#10b981",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:13,flexShrink:0,color:"white",fontWeight:700,
            }}>✓</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#065f46"}}>Proceso completado</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:1}}>{sc.end}</div>
            </div>
          </div>
        </div>

        {/* Cancelación note */}
        {(scenario==="cancelacion_usuario"||scenario==="cancelacion_admin")&&(
          <div style={{marginTop:16,padding:"12px 14px",background:"#fff1f2",borderRadius:10,border:"1px solid #fecdd3"}}>
            <div style={{fontSize:12,color:"#9f1239",lineHeight:1.6}}>
              <strong>Plazo de cancelación:</strong> hasta 72 horas hábiles antes del inicio del curso. Los sábados, domingos y festivos de Madrid (nacionales y locales: 15 de mayo y 9 de noviembre) no cuentan. Los administradores de IAI pueden cancelar sin restricción de plazo.
            </div>
          </div>
        )}

        {/* Legend */}
        <div style={{
          marginTop:20,padding:"14px 16px",
          background:"white",borderRadius:10,
          border:"1px solid #e2e8f0",
          display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap",
        }}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",
              letterSpacing:"0.06em",marginBottom:8,fontFamily:"DM Mono, monospace"}}>
              Sistemas involucrados
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["usuario","weweb","supabase","n8n","hubspot","moodle","redsys","wordpress","bc","iai_admin"].map(function(s){
                return <SystemTag key={s} sys={s}/>;
              })}
            </div>
          </div>
          <div style={{
            fontSize:12,color:"#94a3b8",lineHeight:1.6,
            borderLeft:"1px solid #f1f5f9",paddingLeft:16,
            maxWidth:340,
          }}>
            La columna izquierda describe <strong style={{color:"#475569"}}>lo que ocurre</strong> desde el punto de vista del usuario o del administrador.
            La columna derecha muestra <strong style={{color:"#475569"}}>los sistemas y las operaciones técnicas</strong> que se ejecutan en paralelo.
          </div>
        </div>

        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
