<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IAI · Acceso al Portal</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:#f8fafc;font-family:'DM Sans',system-ui,sans-serif}
    #root{min-height:100%}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .step-card{cursor:pointer;transition:box-shadow .15s,transform .15s}
    .step-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .btn{cursor:pointer;transition:all .15s;border:none;font-family:'DM Sans',sans-serif}
    .btn:hover{opacity:.85}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
    .back-link{text-decoration:none;color:#64748b;font-size:13px;display:inline-flex;align-items:center;gap:5px}
    .back-link:hover{color:#334155}
  </style>

<style>
.iai-nav{position:sticky;top:0;z-index:999;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.iai-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:24px;height:44px;overflow-x:auto}
.iai-nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;font-size:12px;font-weight:600;color:#0f172a;white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace}
.iai-nav-dot{width:8px;height:8px;border-radius:99px;background:#f97316;flex-shrink:0}
.iai-nav-links{display:flex;gap:2px;align-items:center}
.iai-nav-links a{text-decoration:none;font-size:12px;color:#64748b;padding:4px 10px;border-radius:6px;white-space:nowrap;transition:background .15s,color .15s}
.iai-nav-links a:hover{background:#f1f5f9;color:#0f172a}
.iai-nav-links a.active{background:#fff7ed;color:#f97316;font-weight:500}
</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var cur=window.location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.iai-nav-links a').forEach(function(a){
    if(a.getAttribute('href')===cur)a.classList.add('active');
  });
});
</script>

</head>
<body>
<nav class="iai-nav">
  <div class="iai-nav-inner">
    <a class="iai-nav-logo" href="index.html">
      <span class="iai-nav-dot"></span>
      <span>IAI · Documentación</span>
    </a>
    <div class="iai-nav-links">
      <a href="index.html">Inicio</a>
      <a href="alta-socios.html">Alta socios</a>
      <a href="acceso-portal.html">Acceso portal</a>
      <a href="gestion-socios.html">Gestión socios</a>
      <a href="ciclo-producto.html">Productos</a>
      <a href="inscripciones-aforo-diplomas.html">Inscripciones</a>
      <a href="administracion-pagos.html">Pagos</a>
      <a href="consultas-reportes-notificaciones.html">Consultas</a>
      <a href="privacidad-etica.html">Privacidad</a>
      <a href="renovacion-cuota.html">Renovación</a>
      <a href="estado-proyecto.html">Estado</a>
      <a href="inventario.html">Inventario</a>
    </div>
  </div>
</nav>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const SYS_COLOR = {
  usuario:"#64748b", wordpress:"#3b82f6", weweb:"#8b5cf6",
  supabase:"#10b981", moodle:"#06b6d4", hubspot:"#f97316", n8n:"#ef4444",
};
const SYS_LABEL = {
  usuario:"Usuario", wordpress:"Web pública", weweb:"Portal del socio",
  supabase:"Base de datos", moodle:"Campus virtual", hubspot:"CRM", n8n:"Automatización",
};

const FASE_STYLES = {
  acceso:      {bg:"#eff6ff",text:"#1d4ed8",border:"#bfdbfe",label:"Acceso"},
  identidad:   {bg:"#f5f3ff",text:"#5b21b6",border:"#ddd6fe",label:"Verificación de identidad"},
  cuenta:      {bg:"#ecfdf5",text:"#065f46",border:"#a7f3d0",label:"Creación de cuenta"},
  perfil:      {bg:"#fffbeb",text:"#92400e",border:"#fde68a",label:"Perfil"},
  recuperacion:{bg:"#fff1f2",text:"#9f1239",border:"#fecdd3",label:"Recuperación"},
  sso:         {bg:"#ecfeff",text:"#155e75",border:"#a5f3fc",label:"Inicio de sesión único"},
  listo:       {bg:"#ecfdf5",text:"#065f46",border:"#a7f3d0",label:"Acceso concedido"},
};

const SCENARIOS = {
  registro: {
    icon:"✨", label:"Registro nuevo",
    color:"#8b5cf6", desc:"Un usuario nuevo crea su cuenta por primera vez",
    end:"Cuenta creada y perfil básico listo. El usuario puede explorar el portal y solicitar membresía.",
  },
  login: {
    icon:"🔑", label:"Login recurrente",
    color:"#3b82f6", desc:"Un usuario con cuenta accede al portal",
    end:"Sesión activa en el portal. Acceso a todas las secciones según el tipo de cuenta.",
  },
  sso: {
    icon:"🔗", label:"Acceso desde Moodle o Web",
    color:"#06b6d4", desc:"El usuario hace clic en 'Iniciar sesión' desde el campus o la web",
    end:"El usuario queda identificado en Moodle o WordPress sin haber introducido sus credenciales de nuevo.",
  },
  recovery: {
    icon:"🔓", label:"Recuperar contraseña",
    color:"#f43f5e", desc:"El usuario no recuerda su contraseña",
    end:"Contraseña cambiada. El usuario puede acceder con sus nuevas credenciales.",
  },
};

const ALL_STEPS = [
  // ── REGISTRO ──
  {scenario:"registro", sys:"wordpress", fase:"acceso",
    who:"El futuro usuario",
    what:"Llega al portal desde la web de IAI",
    why:"Cualquier persona que quiera acceder al portal — para inscribirse en cursos, hacerse socio o consultar contenido exclusivo — parte desde la web pública de IAI.",
    tech:"auditoresinternos.es → botón 'Iniciar sesión' → redirección a portal.auditoresinternos.es/login."},

  {scenario:"registro", sys:"weweb", fase:"acceso",
    who:"El futuro usuario",
    what:"Elige crear una cuenta nueva",
    why:"Si es la primera vez, puede registrarse con su email. No necesita ser socio para tener cuenta.",
    tech:"Formulario de registro en WeWeb. Llama a Supabase Auth signUp()."},

  {scenario:"registro", sys:"supabase", fase:"identidad",
    who:"El sistema",
    what:"Envía un email de confirmación",
    why:"Para verificar que el email es real, el sistema envía un enlace de confirmación que el usuario debe clicar.",
    tech:"Supabase Auth envía magic link de confirmación. Hasta confirmar, el usuario no puede iniciar sesión."},

  {scenario:"registro", sys:"supabase", fase:"cuenta",
    who:"El sistema",
    what:"Crea la cuenta y el perfil del usuario",
    why:"Una vez confirmado el email, se crea el perfil completo del usuario en el sistema con sus datos básicos.",
    tech:"Edge Fn signup-or-notify: crea user_profiles con membership_status vacío, onboarding_completed=false."},

  {scenario:"registro", sys:"hubspot", fase:"cuenta",
    who:"El sistema",
    what:"Registra al nuevo usuario en el CRM",
    why:"IAI tiene constancia del nuevo usuario desde el primer momento para poder hacer seguimiento.",
    tech:"n8n detecta nuevo user_profile → crea Contacto en HubSpot con email y datos básicos."},

  {scenario:"registro", sys:"weweb", fase:"perfil",
    who:"El usuario",
    what:"Completa su perfil con sus datos personales",
    why:"Para poder inscribirse en cursos o solicitar membresía, el sistema necesita datos como nombre, DNI, dirección y datos de facturación.",
    tech:"Campos en user_profiles: first_name, last_name_1, dni_nie, address_*, billing_*, job_title_id. onboarding_completed → true."},

  // ── LOGIN ──
  {scenario:"login", sys:"weweb", fase:"acceso",
    who:"El usuario",
    what:"Introduce su email y contraseña en el portal",
    why:"El acceso al portal requiere identificarse. Todas las funcionalidades de socio, inscripciones y compras requieren estar autenticado.",
    tech:"WeWeb llama a Supabase Auth signInWithPassword(). Retorna access_token + refresh_token."},

  {scenario:"login", sys:"supabase", fase:"identidad",
    who:"El sistema",
    what:"Verifica las credenciales y abre la sesión",
    why:"El sistema comprueba que el email y contraseña son correctos y genera una sesión segura.",
    tech:"Supabase Auth JWT válido 1h. Refresh token para renovar. Sesión almacenada en el cliente (WeWeb)."},

  {scenario:"login", sys:"weweb", fase:"listo",
    who:"El usuario",
    what:"Accede al portal con su perfil y permisos",
    why:"El portal carga el perfil del usuario y muestra las opciones según su tipo: usuario registrado, socio individual o representante corporativo.",
    tech:"WeWeb lee user_profiles: membership_status, is_consejero, has_premium_service, company_representatives para determinar menú y permisos."},

  // ── SSO ──
  {scenario:"sso", sys:"moodle", fase:"acceso",
    who:"El usuario",
    what:"Hace clic en 'Iniciar sesión' en el campus virtual o en la web",
    why:"El campus virtual (Moodle) y la web (WordPress) no tienen su propio sistema de login — delegan la autenticación al portal, que es el sistema central de identidad de IAI.",
    tech:"Moodle/WordPress redirigen a oauth-authorize Edge Fn con client_id, redirect_uri, response_type=code, state y code_challenge (PKCE)."},

  {scenario:"sso", sys:"supabase", fase:"identidad",
    who:"El sistema",
    what:"Comprueba si el usuario ya tiene sesión activa en el portal",
    why:"Si el usuario ya estaba autenticado en el portal, no necesita volver a introducir sus credenciales. El acceso es inmediato.",
    tech:"oauth-authorize verifica el Bearer token del request. Si válido → genera código de autorización directamente. Si no → redirige a /login con parámetros OAuth preservados en la URL."},

  {scenario:"sso", sys:"weweb", fase:"identidad",
    who:"El usuario",
    what:"Si no tiene sesión, inicia sesión en el portal",
    why:"El portal actúa como pantalla de login central. Una vez autenticado aquí, el acceso se propaga automáticamente a Moodle y WordPress.",
    tech:"Login en portal.auditoresinternos.es/login?oauth_redirect=true&client_id=...&redirect_uri=... Tras login, WeWeb llama de nuevo a oauth-authorize con el token."},

  {scenario:"sso", sys:"supabase", fase:"sso",
    who:"El sistema",
    what:"Genera un código de autorización temporal",
    why:"El portal genera un código de un solo uso (válido 10 minutos) que Moodle o WordPress intercambiarán por las credenciales del usuario.",
    tech:"oauth-authorize inserta en oauth2_authorization_codes: code, client_id, user_id, scope, expires_at (10 min), PKCE challenge."},

  {scenario:"sso", sys:"moodle", fase:"sso",
    who:"El sistema",
    what:"Intercambia el código por los datos del usuario y abre la sesión",
    why:"Moodle o WordPress reciben el código, lo verifican con el portal y obtienen la identidad del usuario para crear su sesión local.",
    tech:"oauth-token: valida code + PKCE, genera access_token (oauth2_access_tokens) + refresh_token. oauth-userinfo: retorna id, email, name, roles del user_profile."},

  {scenario:"sso", sys:"moodle", fase:"listo",
    who:"El usuario",
    what:"Queda identificado en Moodle o WordPress automáticamente",
    why:"El usuario llega directamente a su destino — el campus o la web — ya autenticado, sin fricciones.",
    tech:"Moodle crea o actualiza el usuario local con los datos del userinfo. WordPress idem. Sesión local creada en cada sistema."},

  // ── RECOVERY ──
  {scenario:"recovery", sys:"weweb", fase:"acceso",
    who:"El usuario",
    what:"Hace clic en '¿Olvidaste tu contraseña?' en el portal",
    why:"Permite recuperar el acceso sin necesidad de contactar con IAI.",
    tech:"Formulario en portal.auditoresinternos.es/login. Introduce su email y solicita el enlace de recuperación."},

  {scenario:"recovery", sys:"supabase", fase:"recuperacion",
    who:"El sistema",
    what:"Envía un email con un enlace seguro de recuperación",
    why:"El enlace lleva al usuario directamente a la página para establecer su nueva contraseña. Es de un solo uso y caduca en poco tiempo.",
    tech:"Edge Fn generate-recovery-link genera el token. Email enviado con enlace a api.auditoresinternos.es/functions/v1/recovery-gate?token_hash=..."},

  {scenario:"recovery", sys:"supabase", fase:"recuperacion",
    who:"El sistema",
    what:"Protege el enlace contra escáneres de email",
    why:"Algunos clientes de email escanean los enlaces automáticamente al recibir el mensaje, lo que podría 'quemar' el token antes de que el usuario lo use. El sistema lo evita.",
    tech:"recovery-gate devuelve HTML con redirect JS. Los escáneres hacen GET pero no ejecutan JS → token intacto. El usuario con navegador → JS redirige inmediatamente a Supabase Auth verify."},

  {scenario:"recovery", sys:"weweb", fase:"recuperacion",
    who:"El usuario",
    what:"Establece su nueva contraseña",
    why:"El usuario llega a la página de restablecimiento ya autenticado por el token, solo tiene que introducir su nueva contraseña.",
    tech:"Supabase Auth verifica token_hash → sesión temporal. WeWeb /reset-password llama a updateUser({password: newPassword})."},

  {scenario:"recovery", sys:"weweb", fase:"listo",
    who:"El usuario",
    what:"Accede al portal con su nueva contraseña",
    why:"El proceso de recuperación ha terminado. El usuario tiene acceso completo de nuevo.",
    tech:"Sesión activa post-reset. Refresh tokens anteriores invalidados automáticamente por Supabase Auth."},
];

function SystemTag({ sys }) {
  var c=SYS_COLOR[sys]||"#94a3b8"; var l=SYS_LABEL[sys]||sys;
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:c+"18",border:"1px solid "+c+"44",borderRadius:99,padding:"1px 8px",fontSize:10,color:c,fontWeight:500,fontFamily:"DM Mono,monospace",whiteSpace:"nowrap"}}>{l}</span>;
}

function FaseBadge({ fase }) {
  var c=FASE_STYLES[fase]||FASE_STYLES.acceso;
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,whiteSpace:"nowrap",background:c.bg,color:c.text,border:"1px solid "+c.border}}>{c.label}</span>;
}

function PhaseHeader({ fase, isFirst }) {
  var c=FASE_STYLES[fase]||FASE_STYLES.acceso;
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,margin:isFirst?"0 0 12px":"22px 0 12px"}}>
      <div style={{width:8,height:8,borderRadius:99,background:c.text,flexShrink:0}}/>
      <span style={{fontSize:11,fontWeight:600,color:c.text,fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.07em"}}>{c.label}</span>
      <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
    </div>
  );
}

function Step({ step, idx, techMode, isActive, onToggle }) {
  var sc=SYS_COLOR[step.sys]||"#94a3b8";
  return (
    <div style={{position:"relative"}}>
      {idx>0&&<div style={{height:18,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0",borderRadius:1}}/></div>}
      <div className="step-card" onClick={function(){onToggle(idx);}}
        style={{background:"white",border:"1px solid "+(isActive?sc+"60":"#e2e8f0"),
          borderLeft:"3px solid "+sc,borderRadius:12,padding:"14px 16px",
          display:"flex",gap:12,alignItems:"flex-start",
          boxShadow:isActive?"0 2px 12px rgba(0,0,0,.08)":"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{width:32,height:32,borderRadius:99,flexShrink:0,
          background:isActive?sc:"#f1f5f9",border:"2px solid "+(isActive?sc:"#e2e8f0"),
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:12,fontWeight:600,color:isActive?"white":"#94a3b8",transition:"all .2s",marginTop:1}}>
          {idx+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,flexWrap:"wrap",marginBottom:5}}>
            <span style={{fontSize:13,fontWeight:600,color:"#1e293b",lineHeight:1.35,flex:1,minWidth:100}}>
              <span style={{color:"#94a3b8",fontWeight:400,marginRight:4}}>{step.who} —</span>
              {step.what}
            </span>
            <FaseBadge fase={step.fase}/>
          </div>
          <p style={{fontSize:13,color:"#475569",lineHeight:1.6,marginBottom:6}}>{step.why}</p>
          <SystemTag sys={step.sys}/>
          {(techMode||isActive)&&step.tech&&(
            <div style={{marginTop:10,padding:"8px 12px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",animation:"fadeIn .2s ease"}}>
              <div style={{fontSize:10,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3,fontFamily:"DM Mono,monospace"}}>Detalle técnico</div>
              <p style={{fontSize:12,color:"#64748b",lineHeight:1.55,fontFamily:"DM Mono,monospace"}}>{step.tech}</p>
            </div>
          )}
        </div>
        <div style={{color:"#cbd5e1",fontSize:14,flexShrink:0,marginTop:6,transform:isActive?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
      </div>
    </div>
  );
}

function App() {
  var sa=useState("registro"); var scenario=sa[0]; var setScenario=sa[1];
  var ta=useState(false); var techMode=ta[0]; var setTechMode=ta[1];
  var aa=useState(null); var activeStep=aa[0]; var setActiveStep=aa[1];

  function toggle(idx){setActiveStep(activeStep===idx?null:idx);}

  var steps=ALL_STEPS.filter(function(s){return s.scenario===scenario;});
  var sc=SCENARIOS[scenario];
  var lastFase=null;

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>

      {/* HEADER */}
      <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"16px 20px",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <a href="index.html" className="back-link">← Todos los procesos</a>
                <span style={{color:"#e2e8f0"}}>·</span>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"DM Mono,monospace"}}>AC-03</span>
              </div>
              <h1 style={{fontSize:20,fontWeight:600,color:"#0f172a",letterSpacing:"-0.02em"}}>🔐 Acceso al Portal</h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:2}}>Registro, login, acceso desde Moodle y web, y recuperación de contraseña</p>
            </div>
            <button className="btn" onClick={function(){setTechMode(!techMode);}}
              style={{padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:500,
                background:techMode?"#1e293b":"#f1f5f9",color:techMode?"white":"#64748b",
                border:"1px solid "+(techMode?"#1e293b":"#e2e8f0"),flexShrink:0,marginTop:2}}>
              {techMode?"⚙️ Técnico":"👁 Funcional"}
            </button>
          </div>

          {/* Scenario selector */}
          <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap"}}>
            {Object.entries(SCENARIOS).map(function(e){
              var key=e[0]; var s=e[1]; var active=scenario===key;
              return (
                <button key={key} className="btn"
                  onClick={function(){setScenario(key);setActiveStep(null);}}
                  style={{padding:"6px 13px",borderRadius:8,fontSize:12,fontWeight:active?600:400,
                    background:active?s.color:"white",color:active?"white":"#64748b",
                    border:"1px solid "+(active?s.color:"#e2e8f0")}}>
                  {s.icon} {s.label}
                </button>
              );
            })}
          </div>

          {/* Active scenario description */}
          <div style={{marginTop:10,padding:"8px 12px",background:sc.color+"0f",
            border:"1px solid "+sc.color+"30",borderRadius:8,
            fontSize:12,color:sc.color,display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:5,height:5,borderRadius:99,background:sc.color,flexShrink:0,animation:"fadeIn .3s"}}/>
            {sc.desc}
            <span style={{color:"#94a3b8",marginLeft:4}}>· {steps.length} pasos</span>
          </div>
        </div>
      </div>

      {/* FLOW */}
      <div style={{maxWidth:720,margin:"0 auto",padding:"24px 16px"}}>
        {steps.map(function(step,idx){
          var showHeader=step.fase!==lastFase;
          lastFase=step.fase;
          return (
            <div key={idx}>
              {showHeader&&<PhaseHeader fase={step.fase} isFirst={idx===0}/>}
              <Step step={step} idx={idx} techMode={techMode} isActive={activeStep===idx} onToggle={toggle}/>
            </div>
          );
        })}

        {/* End */}
        <div style={{height:18,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0"}}/></div>
        <div style={{display:"flex",gap:12,alignItems:"center",background:"white",
          border:"1px solid #a7f3d0",borderLeft:"3px solid #10b981",borderRadius:12,padding:"14px 16px",
          boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div style={{width:32,height:32,borderRadius:99,background:"#10b981",color:"white",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>✓</div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#065f46"}}>Proceso completado</div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:1}}>{sc.end}</div>
          </div>
        </div>

        {/* Info panel */}
        <div style={{marginTop:32,padding:"16px",background:"white",borderRadius:12,border:"1px solid #e2e8f0"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12,fontFamily:"DM Mono,monospace"}}>Sobre el sistema de identidad</div>
          <div style={{padding:"10px 12px",background:"#eff6ff",borderRadius:8,border:"1px solid #bfdbfe",marginBottom:10}}>
            <div style={{fontSize:12,color:"#1d4ed8",lineHeight:1.6}}>
              <strong>El portal es el sistema central de identidad.</strong> Moodle y WordPress no tienen su propio login — cuando el usuario hace clic en "Iniciar sesión" en cualquiera de los dos, el portal se encarga de identificarle. Si ya tiene sesión abierta en el portal, el acceso es instantáneo y transparente.
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            {Object.keys(SYS_COLOR).map(function(s){return <SystemTag key={s} sys={s}/>;})}
          </div>
          <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6}}>
            Haz clic en cualquier paso para más detalle. Activa <strong style={{color:"#1e293b"}}>modo técnico</strong> para ver los sistemas y automatizaciones implicadas.
          </div>
        </div>
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
