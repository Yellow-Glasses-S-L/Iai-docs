<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IAI · Consultas, Reportes y Notificaciones</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:#f8fafc;font-family:'DM Sans',system-ui,sans-serif}
    #root{min-height:100%}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .step-card{cursor:pointer;transition:box-shadow .15s,transform .15s}
    .step-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .btn{cursor:pointer;transition:all .15s;border:none;font-family:'DM Sans',sans-serif}
    .btn:hover{opacity:.85}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
    .back-link{text-decoration:none;color:#64748b;font-size:13px;display:inline-flex;align-items:center;gap:5px}
    .back-link:hover{color:#334155}
  </style>

<style>
.iai-nav{position:sticky;top:0;z-index:999;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.iai-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:24px;height:44px;overflow-x:auto}
.iai-nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;font-size:12px;font-weight:600;color:#0f172a;white-space:nowrap;flex-shrink:0;font-family:'DM Mono',monospace}
.iai-nav-dot{width:8px;height:8px;border-radius:99px;background:#f97316;flex-shrink:0}
.iai-nav-links{display:flex;gap:2px;align-items:center}
.iai-nav-links a{text-decoration:none;font-size:12px;color:#64748b;padding:4px 10px;border-radius:6px;white-space:nowrap;transition:background .15s,color .15s}
.iai-nav-links a:hover{background:#f1f5f9;color:#0f172a}
.iai-nav-links a.active{background:#fff7ed;color:#f97316;font-weight:500}
</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var cur=window.location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.iai-nav-links a').forEach(function(a){
    if(a.getAttribute('href')===cur)a.classList.add('active');
  });
});
</script>

</head>
<body>
<nav class="iai-nav">
  <div class="iai-nav-inner">
    <a class="iai-nav-logo" href="index.html">
      <span class="iai-nav-dot"></span>
      <span>IAI · Documentación</span>
    </a>
    <div class="iai-nav-links">
      <a href="index.html">Inicio</a>
      <a href="alta-socios.html">Alta socios</a>
      <a href="acceso-portal.html">Acceso portal</a>
      <a href="gestion-socios.html">Gestión socios</a>
      <a href="ciclo-producto.html">Productos</a>
      <a href="inscripciones-aforo-diplomas.html">Inscripciones</a>
      <a href="administracion-pagos.html">Pagos</a>
      <a href="consultas-reportes-notificaciones.html">Consultas</a>
      <a href="privacidad-etica.html">Privacidad</a>
      <a href="renovacion-cuota.html">Renovación</a>
      <a href="estado-proyecto.html">Estado</a>
      <a href="inventario.html">Inventario</a>
      <a href="issues.html">Incidentes</a>
    </div>
  </div>
</nav>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const SYS_COLOR = {
  usuario:"#64748b", weweb:"#8b5cf6", supabase:"#10b981",
  n8n:"#ef4444", hubspot:"#f97316", moodle:"#06b6d4",
  iai_admin:"#f43f5e",
};
const SYS_LABEL = {
  usuario:"Usuario / Socio", weweb:"Portal del socio", supabase:"Base de datos",
  n8n:"Automatización", hubspot:"CRM", moodle:"Campus virtual",
  iai_admin:"IAI (gestión interna)",
};

const FASE_STYLES = {
  acceso:       {bg:"#eff6ff", text:"#1d4ed8", border:"#bfdbfe", label:"Acceso"},
  consulta:     {bg:"#f5f3ff", text:"#5b21b6", border:"#ddd6fe", label:"Consulta"},
  resultado:    {bg:"#ecfdf5", text:"#065f46", border:"#a7f3d0", label:"Resultado"},
  reporte:      {bg:"#eef2ff", text:"#3730a3", border:"#c7d2fe", label:"Reporte"},
  envio:        {bg:"#fffbeb", text:"#92400e", border:"#fde68a", label:"Envío automático"},
  recordatorio: {bg:"#fef2f2", text:"#991b1b", border:"#fecaca", label:"Recordatorio"},
  confirmacion: {bg:"#ecfdf5", text:"#065f46", border:"#a7f3d0", label:"Confirmación"},
  construccion: {bg:"#f8fafc", text:"#475569", border:"#cbd5e1", label:"En construcción"},
};

const SCENARIOS = {
  historico: {
    icon:"📚", label:"Histórico de cursos del socio",
    color:"#8b5cf6", ac:"AC-15",
    desc:"El socio consulta su historial completo de formaciones realizadas",
    end:"El socio ve todos sus cursos, horas acumuladas y diplomas disponibles.",
  },
  listados_admin: {
    icon:"📊", label:"Listados de inscripciones (admin)",
    color:"#f97316", ac:"AC-16",
    desc:"El equipo de IAI consulta inscripciones, asistentes e ingresos por curso",
    end:"IAI tiene visibilidad completa de inscripciones para gestión y reporting.",
  },
  recordatorios_hs: {
    icon:"📧", label:"Recordatorios por email (HubSpot)",
    color:"#f97316", ac:"AC-17",
    desc:"Emails automáticos de confirmación y recordatorio vía workflows de HubSpot",
    end:"El alumno recibe confirmación de inscripción y recordatorios antes del curso.",
  },
  notificaciones_portal: {
    icon:"🔔", label:"Notificaciones en el portal",
    color:"#8b5cf6", ac:"AC-17",
    desc:"Módulo de notificaciones in-app en el portal del socio",
    end:"El socio recibe avisos dentro del portal sin necesidad de revisar el email.",
    wip:true,
  },
};

const ALL_STEPS = [

  // ── HISTÓRICO ──
  {scenario:"historico", sys:"weweb", fase:"acceso", wip:false,
    who:"El socio",
    what:"Accede a 'Mis formaciones' en el portal",
    why:"El socio puede consultar en cualquier momento el historial completo de todas las formaciones en las que ha participado, con sus horas CPE acumuladas y el estado de cada una.",
    tech:"Portal WeWeb → sección /mis-inscripciones o /mis-formaciones. Lee product_registrations del usuario autenticado."},

  {scenario:"historico", sys:"supabase", fase:"consulta", wip:false,
    who:"El sistema",
    what:"Recupera el historial de inscripciones del socio",
    why:"El sistema muestra todas las formaciones: en curso, completadas y canceladas, ordenadas por fecha.",
    tech:"product_registrations JOIN products: title, start_date, end_date, total_cpe_hours, status, certificate_issued, completion_date. Filtrado por user_id."},

  {scenario:"historico", sys:"weweb", fase:"resultado", wip:false,
    who:"El socio",
    what:"Ve el listado con el estado de cada formación",
    why:"Para cada formación aparece: nombre, fechas, horas CPE reconocidas, estado de asistencia y si el diploma está disponible para descargar.",
    tech:"Estados posibles en product_registrations: registered, attended, completed, cancelled, waitlist. certificate_issued=true habilita el botón de diploma."},

  {scenario:"historico", sys:"moodle", fase:"consulta", wip:true,
    who:"El sistema",
    what:"Muestra el progreso del alumno en el campus virtual",
    why:"Para formaciones e-learning o blended, el portal puede mostrar el porcentaje de avance del alumno dentro del curso en Moodle — cuántos módulos ha completado, qué le queda por hacer.",
    tech:"🚧 EN CONSTRUCCIÓN — Flujo n8n identificado y desarrollado, pendiente de pruebas y puesta en producción. product_registrations.moodle_enrollment_id vincula con Moodle. API: core_completion_get_course_completion_status."},

  {scenario:"historico", sys:"weweb", fase:"resultado", wip:false,
    who:"El socio",
    what:"Descarga los diplomas de las formaciones completadas",
    why:"Desde el historial el socio puede descargar directamente cualquier diploma disponible, sin tener que buscarlo en su email.",
    tech:"Botón diploma visible si certificate_issued=true. Llama a generate-certificate Edge Fn con el registration_id. Retorna PDF base64."},

  // ── LISTADOS ADMIN ──
  {scenario:"listados_admin", sys:"iai_admin", fase:"acceso", wip:false,
    who:"El equipo de IAI",
    what:"Accede al panel de administración del portal",
    why:"El panel de admin permite a IAI consultar las inscripciones de cualquier curso o evento: quién está apuntado, cuántas plazas quedan y qué ingresos ha generado.",
    tech:"Panel admin WeWeb con rol admin. Lee product_registrations, deals, deal_items, user_profiles con filtros por product_id."},

  {scenario:"listados_admin", sys:"supabase", fase:"consulta", wip:false,
    who:"El sistema",
    what:"Filtra y agrupa los datos de inscripciones",
    why:"El admin puede filtrar por curso, fecha, estado de inscripción o tipo de pago para obtener exactamente la vista que necesita.",
    tech:"product_registrations JOIN user_profiles JOIN deals JOIN deal_items. Filtros: product_id, status, date range, payment_method. Conteo de plazas: max_capacity vs activos."},

  {scenario:"listados_admin", sys:"weweb", fase:"resultado", wip:false,
    who:"El equipo de IAI",
    what:"Ve el listado de inscritos con todos los datos relevantes",
    why:"Para cada inscrito aparece: nombre, email, tipo de socio, método de pago, importe, estado y si ha sido confirmada la asistencia.",
    tech:"Vista admin en WeWeb: tabla con user_profiles.full_name, email, membership_type, deals.payment_method_id, deal_items.total_with_taxes, product_registrations.status, attendance_status."},

  {scenario:"listados_admin", sys:"hubspot", fase:"reporte", wip:false,
    who:"El equipo de IAI",
    what:"Consulta reportes de ingresos y conversión en HubSpot",
    why:"Para análisis más avanzados — comparativa por periodos, tasa de conversión, ingresos por tipo de socio — IAI usa los dashboards de HubSpot donde todos los deals están sincronizados.",
    tech:"HubSpot Reports: deals por producto, ingresos por pipeline stage, conversión por membership_type. Datos sincronizados desde Supabase vía n8n SYNC workflows."},

  {scenario:"listados_admin", sys:"weweb", fase:"reporte", wip:false,
    who:"El equipo de IAI",
    what:"Exporta el listado para gestión presencial o comunicaciones",
    why:"Antes de un curso presencial, IAI puede exportar la lista de asistentes para el control de acceso o para preparar el material.",
    tech:"Export CSV/Excel desde panel admin WeWeb con los campos seleccionados de product_registrations + user_profiles."},

  // ── RECORDATORIOS HUBSPOT ──
  {scenario:"recordatorios_hs", sys:"hubspot", fase:"confirmacion", wip:false,
    who:"El sistema",
    what:"Envía confirmación de inscripción al alumno por email",
    why:"En cuanto se confirma el pago y el deal queda cerrado en HubSpot, el alumno recibe un email de confirmación con los detalles del curso: fecha, lugar, acceso al campus si aplica.",
    tech:"HubSpot workflow disparado por deal.stage = closedwon. Email template con propiedades del deal y del producto: nombre curso, fecha, dirección o URL de acceso."},

  {scenario:"recordatorios_hs", sys:"hubspot", fase:"recordatorio", wip:false,
    who:"El sistema",
    what:"Envía un recordatorio unos días antes del inicio del curso",
    why:"El alumno recibe un recordatorio con toda la información necesaria para el día del curso: hora, lugar, materiales descargables, cómo acceder al campus o la URL de streaming.",
    tech:"HubSpot workflow con criterio temporal: X días antes de fecha_de_inicio del producto asociado al deal. Email con detalles logísticos del curso."},

  {scenario:"recordatorios_hs", sys:"hubspot", fase:"envio", wip:false,
    who:"El sistema",
    what:"Envía email post-formación con el enlace al diploma",
    why:"Una vez finalizado el curso y marcada la asistencia, el alumno recibe un email con su diploma adjunto o el enlace para descargarlo desde el portal.",
    tech:"HubSpot workflow o n8n post-completion: cuando certificate_issued=true en product_registrations → email al alumno con diploma PDF generado por generate-certificate."},

  // ── NOTIFICACIONES PORTAL ──
  {scenario:"notificaciones_portal", sys:"weweb", fase:"construccion", wip:true,
    who:"El socio",
    what:"Recibe notificaciones dentro del propio portal",
    why:"El módulo de notificaciones in-app permitirá al socio ver avisos importantes directamente en el portal sin depender solo del email: inscripciones próximas, diplomas disponibles, vencimiento de membresía, aprobaciones pendientes...",
    tech:"🚧 EN CONSTRUCCIÓN — tabla notifications en Supabase ya creada (0 rows). Pendiente de implementar el módulo de notificaciones en WeWeb y los workflows n8n que las generen."},

  {scenario:"notificaciones_portal", sys:"supabase", fase:"construccion", wip:true,
    who:"El sistema",
    what:"Almacena y gestiona las notificaciones de cada usuario",
    why:"Cada notificación quedará guardada para que el socio pueda verla cuando entre al portal, aunque no esté conectado en el momento en que se genera.",
    tech:"🚧 EN CONSTRUCCIÓN — tabla notifications: user_id, type, title, body, read_at, action_url, created_at. Tipos previstos: diploma_ready, course_reminder, membership_expiry, credit_approval_pending."},

  {scenario:"notificaciones_portal", sys:"n8n", fase:"construccion", wip:true,
    who:"El sistema",
    what:"Genera notificaciones automáticamente según los eventos del sistema",
    why:"Los mismos eventos que hoy solo generan emails (inscripción, diploma, recordatorio) también crearán notificaciones en el portal para los socios que prefieran gestionarlo desde allí.",
    tech:"🚧 EN CONSTRUCCIÓN — n8n workflows insertan en tabla notifications tras cada evento relevante: pago confirmado, diploma generado, curso próximo, hora formativa pendiente de aprobación."},
];

function SystemTag({sys}) {
  var c=SYS_COLOR[sys]||"#94a3b8"; var l=SYS_LABEL[sys]||sys;
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:c+"18",border:"1px solid "+c+"44",borderRadius:99,padding:"1px 8px",fontSize:10,color:c,fontWeight:500,fontFamily:"DM Mono,monospace",whiteSpace:"nowrap"}}>{l}</span>;
}

function FaseBadge({fase}) {
  var c=FASE_STYLES[fase]||FASE_STYLES.acceso;
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,whiteSpace:"nowrap",background:c.bg,color:c.text,border:"1px solid "+c.border}}>{c.label}</span>;
}

function PhaseHeader({fase,isFirst}) {
  var c=FASE_STYLES[fase]||FASE_STYLES.acceso;
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,margin:isFirst?"0 0 12px":"22px 0 12px"}}>
      <div style={{width:8,height:8,borderRadius:99,background:c.text,flexShrink:0}}/>
      <span style={{fontSize:11,fontWeight:600,color:c.text,fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.07em"}}>{c.label}</span>
      <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
    </div>
  );
}

function Step({step,idx,techMode,isActive,onToggle}) {
  var sc=SYS_COLOR[step.sys]||"#94a3b8";
  var wipBorder=step.wip?"#fbbf24":null;
  return (
    <div style={{position:"relative"}}>
      {idx>0&&<div style={{height:18,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0",borderRadius:1}}/></div>}
      <div className="step-card" onClick={function(){onToggle(idx);}}
        style={{background:step.wip?"#fffbeb":"white",
          border:"1px solid "+(isActive?sc+"60":(wipBorder||"#e2e8f0")),
          borderLeft:"3px solid "+(wipBorder||sc),
          borderRadius:12,padding:"14px 16px",
          display:"flex",gap:12,alignItems:"flex-start",
          boxShadow:isActive?"0 2px 12px rgba(0,0,0,.08)":"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{width:32,height:32,borderRadius:99,flexShrink:0,
          background:isActive?sc:(step.wip?"#fef3c7":"#f1f5f9"),
          border:"2px solid "+(isActive?sc:(step.wip?"#fbbf24":"#e2e8f0")),
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:step.wip?14:12,fontWeight:600,
          color:isActive?"white":(step.wip?"#92400e":"#94a3b8"),
          transition:"all .2s",marginTop:1}}>
          {step.wip?"🚧":idx+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,flexWrap:"wrap",marginBottom:5}}>
            <span style={{fontSize:13,fontWeight:600,color:"#1e293b",lineHeight:1.35,flex:1,minWidth:100}}>
              <span style={{color:"#94a3b8",fontWeight:400,marginRight:4}}>{step.who} —</span>
              {step.what}
            </span>
            <FaseBadge fase={step.fase}/>
            {step.wip&&<span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:500,background:"#fef3c7",color:"#92400e",border:"1px solid #fde68a",whiteSpace:"nowrap"}}>🚧 En construcción</span>}
          </div>
          <p style={{fontSize:13,color:"#475569",lineHeight:1.6,marginBottom:6}}>{step.why}</p>
          <SystemTag sys={step.sys}/>
          {(techMode||isActive)&&step.tech&&(
            <div style={{marginTop:10,padding:"8px 12px",
              background:step.wip?"#fef9c3":"#f8fafc",
              borderRadius:8,border:"1px solid "+(step.wip?"#fde68a":"#e2e8f0"),
              animation:"fadeIn .2s ease"}}>
              <div style={{fontSize:10,fontWeight:600,color:step.wip?"#92400e":"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3,fontFamily:"DM Mono,monospace"}}>
                {step.wip?"Estado técnico":"Detalle técnico"}
              </div>
              <p style={{fontSize:12,color:step.wip?"#78350f":"#64748b",lineHeight:1.55,fontFamily:"DM Mono,monospace"}}>{step.tech}</p>
            </div>
          )}
        </div>
        <div style={{color:"#cbd5e1",fontSize:14,flexShrink:0,marginTop:6,transform:isActive?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
      </div>
    </div>
  );
}

function App() {
  var sa=useState("historico"); var scenario=sa[0]; var setScenario=sa[1];
  var ta=useState(false); var techMode=ta[0]; var setTechMode=ta[1];
  var aa=useState(null); var activeStep=aa[0]; var setActiveStep=aa[1];

  function toggle(idx){setActiveStep(activeStep===idx?null:idx);}

  var steps=ALL_STEPS.filter(function(s){return s.scenario===scenario;});
  var sc=SCENARIOS[scenario];
  var lastFase=null;
  var wipCount=steps.filter(function(s){return s.wip;}).length;

  var groups=[
    {label:"AC-15 · Consultas del socio", keys:["historico"]},
    {label:"AC-16 · Reportes para IAI", keys:["listados_admin"]},
    {label:"AC-17 · Comunicaciones y notificaciones", keys:["recordatorios_hs","notificaciones_portal"]},
  ];

  return (
    <div style={{background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>

      <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"16px 20px",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <a href="index.html" className="back-link">← Todos los procesos</a>
                <span style={{color:"#e2e8f0"}}>·</span>
                <span style={{fontSize:11,color:"#94a3b8",fontFamily:"DM Mono,monospace"}}>AC-15 · AC-16 · AC-17</span>
              </div>
              <h1 style={{fontSize:20,fontWeight:600,color:"#0f172a",letterSpacing:"-0.02em"}}>
                📋 Consultas, Reportes y Notificaciones
              </h1>
              <p style={{fontSize:13,color:"#64748b",marginTop:2}}>
                Histórico de formaciones, listados para administración y comunicaciones con el alumno
              </p>
            </div>
            <button className="btn" onClick={function(){setTechMode(!techMode);}}
              style={{padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:500,
                background:techMode?"#1e293b":"#f1f5f9",color:techMode?"white":"#64748b",
                border:"1px solid "+(techMode?"#1e293b":"#e2e8f0"),flexShrink:0,marginTop:2}}>
              {techMode?"⚙️ Técnico":"👁 Funcional"}
            </button>
          </div>

          <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
            {groups.map(function(g){
              return (
                <div key={g.label}>
                  <div style={{fontSize:10,color:"#94a3b8",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>{g.label}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {g.keys.map(function(key){
                      var s=SCENARIOS[key]; var active=scenario===key;
                      var hasWip=s.wip||ALL_STEPS.filter(function(x){return x.scenario===key&&x.wip;}).length>0;
                      return (
                        <button key={key} className="btn"
                          onClick={function(){setScenario(key);setActiveStep(null);}}
                          style={{padding:"6px 13px",borderRadius:8,fontSize:12,fontWeight:active?600:400,
                            background:active?s.color:"white",color:active?"white":"#64748b",
                            border:"1px solid "+(active?s.color:"#e2e8f0"),position:"relative"}}>
                          {s.icon} {s.label}
                          {hasWip&&<span style={{position:"absolute",top:-4,right:-4,width:8,height:8,borderRadius:99,background:"#f59e0b",border:"2px solid white"}}/>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{marginTop:10,padding:"7px 12px",background:sc.color+"0f",
            border:"1px solid "+sc.color+"30",borderRadius:8,
            display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{width:5,height:5,borderRadius:99,background:sc.color,flexShrink:0}}/>
            <span style={{fontSize:12,color:sc.color}}>{sc.desc}</span>
            <span style={{fontSize:12,color:"#94a3b8"}}>· {steps.length} pasos</span>
            {wipCount>0&&<span style={{fontSize:11,color:"#92400e",background:"#fef3c7",padding:"1px 8px",borderRadius:99,border:"1px solid #fde68a"}}>🚧 {wipCount} en construcción</span>}
          </div>
        </div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"24px 16px"}}>

        {steps.map(function(step,idx){
          var showHeader=step.fase!==lastFase;
          lastFase=step.fase;
          return (
            <div key={idx}>
              {showHeader&&<PhaseHeader fase={step.fase} isFirst={idx===0}/>}
              <Step step={step} idx={idx} techMode={techMode} isActive={activeStep===idx} onToggle={toggle}/>
            </div>
          );
        })}

        <div style={{height:18,marginLeft:20}}><div style={{width:2,height:"100%",background:"#e2e8f0"}}/></div>
        <div style={{display:"flex",gap:12,alignItems:"center",background:"white",
          border:"1px solid "+(wipCount>0?"#fde68a":"#a7f3d0"),
          borderLeft:"3px solid "+(wipCount>0?"#f59e0b":"#10b981"),
          borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div style={{width:32,height:32,borderRadius:99,
            background:wipCount>0?"#f59e0b":"#10b981",color:"white",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
            {wipCount>0?"🚧":"✓"}
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:wipCount>0?"#92400e":"#065f46"}}>
              {wipCount>0?"Proceso parcialmente implementado":"Proceso completado"}
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:1}}>{sc.end}</div>
          </div>
        </div>

        {/* Info AC-14 */}
        {(scenario==="recordatorios_hs"||scenario==="notificaciones_portal")&&(
          <div style={{marginTop:20,padding:"12px 14px",background:"#fffbeb",borderRadius:10,border:"1px solid #fde68a"}}>
            <div style={{fontSize:12,color:"#92400e",lineHeight:1.6}}>
              <strong>AC-14 — Encuestas de valoración:</strong> actualmente se gestionan de forma manual por fuera del sistema. Está prevista su integración con HubSpot a través de Vexco para automatizar el envío post-formación y centralizar los resultados en el CRM.
            </div>
          </div>
        )}

        <div style={{marginTop:24,padding:"16px",background:"white",borderRadius:12,border:"1px solid #e2e8f0"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10,fontFamily:"DM Mono,monospace"}}>Sistemas involucrados</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {Object.keys(SYS_COLOR).map(function(s){return <SystemTag key={s} sys={s}/>;})}
          </div>
          <div style={{marginTop:10,fontSize:12,color:"#94a3b8",lineHeight:1.6}}>
            Haz clic en cualquier paso para más detalle. Activa <strong style={{color:"#1e293b"}}>modo técnico</strong> para ver los sistemas y automatizaciones implicadas.
          </div>
        </div>
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
